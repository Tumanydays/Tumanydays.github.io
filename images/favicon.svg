<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- 背景圆：静谧的星球本体 -->
  <circle cx="64" cy="64" r="36" fill="none" stroke="#2a2a2a" stroke-width="1.5" opacity="0.6"/>

  <!-- 环一：近乎水平的椭圆环 -->
  <ellipse cx="64" cy="64" rx="48" ry="12" fill="none" stroke="#333" stroke-width="1.3" transform="rotate(-8, 64, 64)"/>

  <!-- 环二：倾斜约 45 度的椭圆环 -->
  <ellipse cx="64" cy="64" rx="46" ry="13" fill="none" stroke="#3a3a3a" stroke-width="1.2" transform="rotate(42, 64, 64)"/>

  <!-- 环三：接近竖直的细环 -->
  <ellipse cx="64" cy="64" rx="38" ry="8" fill="none" stroke="#2e2e2e" stroke-width="1" transform="rotate(-55, 64, 64)"/>

  <!-- 环四：更加扁平的椭圆，像土星环 -->
  <ellipse cx="64" cy="64" rx="52" ry="7" fill="none" stroke="#353535" stroke-width="0.9" stroke-dasharray="3 2" transform="rotate(15, 64, 64)"/>

  <!-- 墨点一：右上方 -->
  <circle cx="86" cy="32" r="2.8" fill="#333" opacity="0.75"/>
  <circle cx="89" cy="28" r="1.5" fill="#444" opacity="0.6"/>

  <!-- 墨点二：左下 -->
  <circle cx="38" cy="90" r="2.2" fill="#383838" opacity="0.7"/>
  <circle cx="34" cy="93" r="1.0" fill="#4a4a4a" opacity="0.5"/>

  <!-- 墨点三：右中偏下，稍大，像意外溅上的 -->
  <circle cx="98" cy="68" r="3.5" fill="#333" opacity="0.55"/>
  <circle cx="102" cy="65" r="1.2" fill="#444" opacity="0.4"/>
  <circle cx="95" cy="72" r="0.8" fill="#3a3a3a" opacity="0.45"/>
</svg>