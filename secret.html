<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>— Tumanydays</title>
    <link rel="icon" type="image/png" href="images/icon.png">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Serif SC", serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.9;
        }
        .container {
            max-width: 520px;
            margin: 0 auto;
            padding: 80px 24px;
        }
        .hint {
            text-align: center;
            font-style: italic;
            color: var(--text-faint);
            font-size: 0.85rem;
            margin-bottom: 32px;
        }
        textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--bg);
            color: var(--text);
            font-size: 0.9rem;
            line-height: 1.8;
            resize: none;
            min-height: 80px;
            font-family: inherit;
            box-sizing: border-box;
            outline: none;
            transition: opacity 1s ease;
        }
        textarea:focus {
            border-color: var(--text-faint);
        }
        #particle-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 10;
        }
        .input-wrap {
            position: relative;
        }
        .submit-btn {
            display: block;
            margin: 12px auto 32px;
            padding: 8px 32px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--bg);
            color: var(--text-muted);
            font-size: 0.85rem;
            cursor: pointer;
            font-family: inherit;
            transition: color 0.3s, border-color 0.3s;
        }
        .submit-btn:hover {
            color: var(--text);
            border-color: var(--text-dim);
        }
        #reveal-wrap {
            display: none;
            max-width: 400px;
            margin: 24px auto 0;
            padding: 32px 28px;
            border: 1px solid var(--border);
            border-radius: 8px;
            text-align: center;
            line-height: 2.4;
            font-size: 0.95rem;
            color: var(--text-soft);
            opacity: 0;
            transition: opacity 1.2s ease;
        }
        #reveal-wrap.show { opacity: 1; }
        #reveal-wrap .gap { display: block; height: 1.5em; }
        #music-toggle {
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-faint);
            cursor: pointer;
            margin-bottom: 24px;
            transition: color 0.3s;
            user-select: none;
        }
        #music-toggle:hover { color: var(--hover); }
        #music-toggle.playing { color: var(--text-muted); }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 28px;
            font-size: 0.85rem;
            color: var(--text-dim);
            text-decoration: none;
        }
        .back-link:hover { color: var(--hover); }
    </style>
</head>
<body>
    <div class="container">
        <p class="hint">谁让我不小心成了你生命中美好又重要的一部分呢</p>

        <p id="music-toggle">♩ 听</p>
        <audio id="bg-music" loop><source src="music.mp3"></audio>

        <div class="input-wrap">
            <textarea id="msg-input" placeholder="写点什么……"></textarea>
            <canvas id="particle-canvas"></canvas>
        </div>
        <button class="submit-btn" id="submit-btn">留下</button>

        <div id="reveal-wrap">
            <p>很遗憾，这里不被设置为可以留下文字。</p>
            <span class="gap"></span>
            <p>不过既然你已经走到这儿了——<br>不妨再靠近些。</p>
            <span class="gap"></span>
            <p>有什么想说的，当面去讲吧。<br>找回一位朋友，会让ta开心很久的。</p>
        </div>

        <a class="back-link" href="index.html">leave</a>
        <p style="text-align:center;margin-top:12px;">
            <a class="back-link" href="index.html" style="display:inline;margin-top:0;">芝华塔尼欧</a>
            <span style="color:var(--text-faint);margin:0 8px;">·</span>
            <a class="back-link" href="index.html" style="display:inline;margin-top:0;">Hollywood</a>
        </p>
    </div>

    <script>
        var input = document.getElementById('msg-input');
        var btn = document.getElementById('submit-btn');
        var card = document.getElementById('reveal-wrap');

        btn.addEventListener('click', function() {
            if (card.classList.contains('show')) return;

            var text = input.value;
            if (!text) return;

            var canvas = document.getElementById('particle-canvas');
            var ctx = canvas.getContext('2d');
            
            canvas.width = input.offsetWidth;
            canvas.height = input.offsetHeight;

            // 把文字渲染到 canvas
            ctx.font = window.getComputedStyle(input).font;
            ctx.textAlign = 'left';
            ctx.textBaseline = 'top';
            ctx.fillStyle = getComputedStyle(document.body).getPropertyValue('--text-soft').trim() || '#555';
            ctx.fillText(text, 16, 14);

            // 绘制边框背景，然后采样整个区域生成粒子
            ctx.strokeStyle = getComputedStyle(document.body).getPropertyValue('--border').trim() || '#e8e8e8';
            ctx.lineWidth = 1;
            ctx.strokeRect(1, 1, canvas.width - 2, canvas.height - 2);

            var imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            var data = imageData.data;
            var particles = [];
            // 文字像素（密度高）
            for (var y = 0; y < canvas.height; y += 2) {
                for (var x = 0; x < canvas.width; x += 2) {
                    var i = (y * canvas.width + x) * 4;
                    if (data[i + 3] > 128) {
                        var angle = Math.random() * Math.PI * 2;
                        var speed = 0.2 + Math.random() * 0.5;
                        particles.push({
                            x: x + (Math.random()-0.5)*2, y: y + (Math.random()-0.5)*2,
                            vx: Math.cos(angle) * speed,
                            vy: Math.sin(angle) * speed - 0.2,
                            life: 0.9 + Math.random() * 0.1,
                            decay: 0.003 + Math.random() * 0.002
                        });
                    }
                }
            }
            // 边框碎片（稀疏分布在整个区域）
            for (var i = 0; i < 200; i++) {
                var angle = Math.random() * Math.PI * 2;
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    vx: Math.cos(angle) * (0.3 + Math.random() * 1),
                    vy: Math.sin(angle) * (0.3 + Math.random() * 1) - 0.5,
                    life: 0.7 + Math.random() * 0.3,
                    decay: 0.004 + Math.random() * 0.003
                });
            }

            if (particles.length === 0) { card.style.display = 'block'; setTimeout(function() { card.classList.add('show'); }, 30); return; }

            // 淡出输入框，淡入 canvas 文字
            btn.style.display = 'none';
            var wrap = input.parentNode;
            canvas.style.opacity = '0';
            canvas.style.transition = 'opacity 0.6s ease';
            wrap.style.pointerEvents = 'none';

            // 记录 canvas 在屏幕上的位置（在隐藏容器前）
            var canvasRect = canvas.getBoundingClientRect();

            setTimeout(function() {
                input.style.opacity = '0';
                canvas.style.opacity = '1';
            }, 50);

            // 延迟片刻后开始粒子飞散
            setTimeout(function() {
                wrap.style.display = 'none';
                // 创建独立 canvas 做粒子动画
                var c2 = document.createElement('canvas');
                c2.width = canvas.width;
                c2.height = canvas.height;
                c2.style.position = 'fixed';
                c2.style.top = canvasRect.top + 'px';
                c2.style.left = canvasRect.left + 'px';
                c2.style.pointerEvents = 'none';
                c2.style.zIndex = '10';
                document.body.appendChild(c2);
                var ctx2 = c2.getContext('2d');

                // 先显示完整文字
                ctx2.font = window.getComputedStyle(input).font;
                ctx2.textAlign = 'left';
                ctx2.textBaseline = 'top';
                ctx2.fillStyle = getComputedStyle(document.body).getPropertyValue('--text-soft').trim() || '#555';
                ctx2.fillText(text, 16, 14);

                // 短暂停留后开始粒子飞散
                setTimeout(function() {
                    function animate() {
                        ctx2.clearRect(0, 0, c2.width, c2.height);
                        var alive = false;
                        particles.forEach(function(p) {
                            p.x += p.vx;
                            p.y += p.vy;
                            p.vy += 0.006;
                            p.life -= p.decay;
                            if (p.life > 0) {
                                alive = true;
                                ctx2.fillStyle = 'rgba(85,85,85,' + p.life + ')';
                                ctx2.fillRect(p.x, p.y, 1, 1);
                            }
                        });
                        var remaining = particles.filter(function(p) { return p.life > 0; }).length;
                        if (alive && remaining > 5) {
                            requestAnimationFrame(animate);
                        } else {
                            c2.style.display = 'none';
                            card.style.display = 'block';
                            setTimeout(function() { card.classList.add('show'); }, 30);
                        }
                    }
                    animate();
                }, 500);
            }, 600);
        });

        // 输入框自动增高
        input.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = this.scrollHeight + 'px';
        });

        // 音乐播放
        var audio = document.getElementById('bg-music');
        var toggle = document.getElementById('music-toggle');
        toggle.addEventListener('click', function() {
            if (audio.paused) {
                audio.play();
                toggle.textContent = '♩ 静音';
                toggle.classList.add('playing');
            } else {
                audio.pause();
                toggle.textContent = '♩ 听';
                toggle.classList.remove('playing');
            }
        });
    </script>
</body>
</html>
