<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>— Tumanydays</title>
    <link rel="icon" type="image/png" href="images/icon.png">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Serif SC", serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.9;
        }
        .container {
            max-width: 520px;
            margin: 0 auto;
            padding: 80px 24px;
        }
        .hint {
            text-align: center;
            font-style: italic;
            color: var(--text-faint);
            font-size: 0.85rem;
            margin-bottom: 48px;
        }
        textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--bg);
            color: var(--text);
            font-size: 0.9rem;
            line-height: 1.8;
            resize: vertical;
            min-height: 80px;
            font-family: inherit;
            box-sizing: border-box;
            outline: none;
        }
        textarea:focus {
            border-color: var(--text-faint);
        }
        .submit-btn {
            display: block;
            margin: 16px auto 48px;
            padding: 8px 32px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--bg);
            color: var(--text-muted);
            font-size: 0.85rem;
            cursor: pointer;
            font-family: inherit;
            transition: color 0.3s, border-color 0.3s;
        }
        .submit-btn:hover {
            color: var(--text);
            border-color: var(--text-dim);
        }
        .entry {
            border-bottom: 1px solid var(--border-light);
            padding: 16px 0;
            font-size: 0.9rem;
            color: var(--text-soft);
            line-height: 1.8;
        }
        .entry:last-child { border-bottom: none; }
        .entry-date {
            font-size: 0.75rem;
            color: var(--text-faint);
            margin-top: 4px;
        }
        .empty {
            text-align: center;
            color: var(--text-faint);
            font-size: 0.85rem;
            font-style: italic;
            padding: 32px 0;
        }
        #music-toggle {
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-faint);
            cursor: pointer;
            margin-bottom: 24px;
            transition: color 0.3s;
            user-select: none;
        }
        #music-toggle:hover { color: var(--hover); }
        #music-toggle.playing { color: var(--text-muted); }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 48px;
            font-size: 0.85rem;
            color: var(--text-dim);
            text-decoration: none;
        }
        .back-link:hover { color: var(--hover); }
    </style>
</head>
<body>
    <div class="container">
        <p class="hint">谁让我不小心成了你生命中美好又重要的一部分呢</p>

        <p id="music-toggle">♩ 听</p>
        <audio id="bg-music" loop><source src="music.mp3"></audio>

        <textarea id="msg-input" placeholder="写点什么……"></textarea>
        <button class="submit-btn" id="submit-btn">留下</button>

        <div id="guestbook"></div>

        <a class="back-link" href="index.html">leave</a>
        <a class="back-link" href="index.html" style="margin-top:12px;">芝华塔尼欧</a>
    </div>

    <script>
        var input = document.getElementById('msg-input');
        var btn = document.getElementById('submit-btn');
        var book = document.getElementById('guestbook');

        function render() {
            var msgs = JSON.parse(localStorage.getItem('guestbook') || '[]');
            if (msgs.length === 0) {
                book.innerHTML = '<div class="empty">这里没有留言。</div>';
                return;
            }
            book.innerHTML = msgs.slice().reverse().map(function(m) {
                return '<div class="entry">' + m.text + '<div class="entry-date">' + m.date + '</div></div>';
            }).join('');
        }

        btn.addEventListener('click', function() {
            var text = input.value.trim();
            if (!text) return;
            var msgs = JSON.parse(localStorage.getItem('guestbook') || '[]');
            msgs.push({ text: text, date: new Date().toLocaleDateString('zh-CN') });
            localStorage.setItem('guestbook', JSON.stringify(msgs));
            input.value = '';
            render();
        });

        render();

        // 音乐播放
        var audio = document.getElementById('bg-music');
        var toggle = document.getElementById('music-toggle');
        toggle.addEventListener('click', function() {
            if (audio.paused) {
                audio.play();
                toggle.textContent = '♩ 静音';
                toggle.classList.add('playing');
            } else {
                audio.pause();
                toggle.textContent = '♩ 听';
                toggle.classList.remove('playing');
            }
        });
    </script>
</body>
</html>
