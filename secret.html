<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>— Tumanydays</title>
    <link rel="icon" type="image/png" href="images/icon.png">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Serif SC", serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.9;
        }
        .container {
            max-width: 520px;
            margin: 0 auto;
            padding: 80px 24px;
        }
        .hint {
            text-align: center;
            font-style: italic;
            color: var(--text-faint);
            font-size: 0.85rem;
            margin-bottom: 32px;
        }
        textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--bg);
            color: var(--text);
            font-size: 0.9rem;
            line-height: 1.8;
            resize: none;
            min-height: 80px;
            font-family: inherit;
            box-sizing: border-box;
            outline: none;
            transition: opacity 1s ease;
        }
        textarea:focus {
            border-color: var(--text-faint);
        }
        #particle-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 10;
        }
        .input-wrap {
            position: relative;
        }
        .submit-btn {
            display: block;
            margin: 12px auto 32px;
            padding: 8px 32px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--bg);
            color: var(--text-muted);
            font-size: 0.85rem;
            cursor: pointer;
            font-family: inherit;
            transition: color 0.3s, border-color 0.3s;
        }
        .submit-btn:hover {
            color: var(--text);
            border-color: var(--text-dim);
        }
        #reveal-wrap {
            display: none;
            max-width: 400px;
            margin: 24px auto 0;
            padding: 32px 28px;
            border: 1px solid var(--border);
            border-radius: 8px;
            text-align: center;
            line-height: 2.4;
            font-size: 0.95rem;
            color: var(--text-soft);
            opacity: 0;
            transition: opacity 1.2s ease;
        }
        #reveal-wrap.show { opacity: 1; }
        #reveal-wrap .gap { display: block; height: 1.5em; }
        #music-toggle {
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-faint);
            cursor: pointer;
            margin-bottom: 24px;
            transition: color 0.3s;
            user-select: none;
        }
        #music-toggle:hover { color: var(--hover); }
        #music-toggle.playing { color: var(--text-muted); }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 28px;
            font-size: 0.85rem;
            color: var(--text-dim);
            text-decoration: none;
        }
        .back-link:hover { color: var(--hover); }
    </style>
</head>
<body>
    <div class="container">
        <p class="hint">谁让我不小心成了你生命中美好又重要的一部分呢</p>

        <p id="music-toggle">♩ 听</p>
        <audio id="bg-music" loop><source src="music.mp3"></audio>

        <div class="input-wrap">
            <textarea id="msg-input" placeholder="写点什么……"></textarea>
            <canvas id="particle-canvas"></canvas>
        </div>
        <button class="submit-btn" id="submit-btn">留下</button>

        <div id="reveal-wrap">
            <p>很遗憾，这里不被设置为可以留下文字。</p>
            <span class="gap"></span>
            <p>不过既然你已经走到这儿了——<br>不妨再靠近些。</p>
            <span class="gap"></span>
            <p>有什么想说的，当面去讲吧。<br>找回一位朋友，会让ta开心很久的。</p>
        </div>

        <a class="back-link" href="index.html">leave</a>
        <p style="text-align:center;margin-top:12px;">
            <a class="back-link" href="index.html" style="display:inline;margin-top:0;">芝华塔尼欧</a>
            <span style="color:var(--text-faint);margin:0 8px;">·</span>
            <a class="back-link" href="index.html" style="display:inline;margin-top:0;">Hollywood</a>
        </p>
    </div>

    <script>
        var input = document.getElementById('msg-input');
        var btn = document.getElementById('submit-btn');
        var card = document.getElementById('reveal-wrap');

        btn.addEventListener('click', function() {
            if (card.classList.contains('show')) return;

            var text = input.value;
            if (!text) return;

            // 隐藏按钮
            btn.style.display = 'none';
            var wrap = input.parentNode;

            // 获取输入框位置和样式
            var rect = input.getBoundingClientRect();
            var style = window.getComputedStyle(input);
            var fontSize = parseFloat(style.fontSize);

            // 隐藏输入框
            input.style.display = 'none';

            // 每个字符生成一个漂浮元素
            var chars = [];
            for (var i = 0; i < text.length; i++) {
                var c = text[i];
                if (c === ' ' || c === '\n') continue;
                var span = document.createElement('span');
                span.textContent = c;
                span.style.position = 'fixed';
                span.style.left = (rect.left + 16 + (i % 35) * fontSize * 0.6) + 'px';
                span.style.top = (rect.top + 12 + Math.floor(i / 35) * fontSize * 1.8) + 'px';
                span.style.font = style.font;
                span.style.fontSize = style.fontSize;
                span.style.color = 'var(--text-soft)';
                span.style.pointerEvents = 'none';
                span.style.zIndex = '10';
                span.style.opacity = '1';
                span.style.transition = 'opacity 1.8s ease, transform 2s ease, filter 1.8s ease';
                document.body.appendChild(span);
                chars.push(span);
                // 随机方向和延迟
                var angle = Math.random() * Math.PI * 2;
                var dist = 30 + Math.random() * 60;
                setTimeout(function(el) {
                    return function() {
                        el.style.opacity = '0';
                        el.style.filter = 'blur(2px)';
                        el.style.transform = 'translate(' + Math.cos(angle) * dist + 'px, ' + (Math.sin(angle) * dist - 20) + 'px)';
                    };
                }(span), 200 + Math.random() * 600);
            }

            // 等待字符散尽
            setTimeout(function() {
                chars.forEach(function(s) { s.remove(); });
                card.style.display = 'block';
                setTimeout(function() { card.classList.add('show'); }, 30);
            }, 2800);
        });

        // 输入框自动增高
        input.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = this.scrollHeight + 'px';
        });

        // 音乐播放
        var audio = document.getElementById('bg-music');
        var toggle = document.getElementById('music-toggle');
        toggle.addEventListener('click', function() {
            if (audio.paused) {
                audio.play();
                toggle.textContent = '♩ 静音';
                toggle.classList.add('playing');
            } else {
                audio.pause();
                toggle.textContent = '♩ 听';
                toggle.classList.remove('playing');
            }
        });
    </script>
</body>
</html>
