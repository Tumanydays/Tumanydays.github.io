<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>— Tumanydays</title>
    <link rel="icon" type="image/png" href="images/icon.png">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Serif SC", serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.9;
        }
        .container {
            max-width: 520px;
            margin: 0 auto;
            padding: 80px 24px;
        }
        .hint {
            text-align: center;
            font-style: italic;
            color: var(--text-faint);
            font-size: 0.85rem;
            margin-bottom: 48px;
        }
        textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--bg);
            color: var(--text);
            font-size: 0.9rem;
            line-height: 1.8;
            resize: vertical;
            min-height: 80px;
            font-family: inherit;
            box-sizing: border-box;
            outline: none;
        }
        textarea:focus {
            border-color: var(--text-faint);
        }
        .submit-btn {
            display: block;
            margin: 16px auto 48px;
            padding: 8px 32px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--bg);
            color: var(--text-muted);
            font-size: 0.85rem;
            cursor: pointer;
            font-family: inherit;
            transition: color 0.3s, border-color 0.3s;
        }
        .submit-btn:hover {
            color: var(--text);
            border-color: var(--text-dim);
        }
        #reveal-card {
            display: none;
            max-width: 420px;
            margin: 40px auto 0;
            padding: 32px 28px;
            border: 1px solid var(--border);
            border-radius: 8px;
            line-height: 2.2;
            font-size: 0.92rem;
            color: var(--text-soft);
            opacity: 0;
            transition: opacity 1s ease;
        }
        #reveal-card.show { opacity: 1; }
        #music-toggle {
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-faint);
            cursor: pointer;
            margin-bottom: 24px;
            transition: color 0.3s;
            user-select: none;
        }
        #music-toggle:hover { color: var(--hover); }
        #music-toggle.playing { color: var(--text-muted); }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 48px;
            font-size: 0.85rem;
            color: var(--text-dim);
            text-decoration: none;
        }
        .back-link:hover { color: var(--hover); }
    </style>
</head>
<body>
    <div class="container">
        <p class="hint">谁让我不小心成了你生命中美好又重要的一部分呢</p>

        <p id="music-toggle">♩ 听</p>
        <audio id="bg-music" loop><source src="music.mp3"></audio>

        <textarea id="msg-input" placeholder="写点什么……"></textarea>
        <button class="submit-btn" id="submit-btn">留下</button>

        <div id="reveal-card">很遗憾，这里没有留言的功能。<br><br>不过既然你已经走到这儿了——<br>不妨再靠近些。<br><br>有什么想说的，去当面讲吧。<br>找回一位朋友，会让ta开心很久的。</div>

        <a class="back-link" href="index.html">leave</a>
        <a class="back-link" href="index.html" style="margin-top:12px;">芝华塔尼欧</a>
    </div>

    <script>
        var input = document.getElementById('msg-input');
        var btn = document.getElementById('submit-btn');
        var card = document.getElementById('reveal-card');

        btn.addEventListener('click', function() {
            if (card.classList.contains('show')) return;
            input.style.display = 'none';
            btn.style.display = 'none';
            card.style.display = 'block';
            setTimeout(function() { card.classList.add('show'); }, 30);
        });

        // 音乐播放
        var audio = document.getElementById('bg-music');
        var toggle = document.getElementById('music-toggle');
        toggle.addEventListener('click', function() {
            if (audio.paused) {
                audio.play();
                toggle.textContent = '♩ 静音';
                toggle.classList.add('playing');
            } else {
                audio.pause();
                toggle.textContent = '♩ 听';
                toggle.classList.remove('playing');
            }
        });
    </script>
</body>
</html>
