<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>— Tumanydays</title>
    <link rel="icon" type="image/png" href="images/icon.png">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Serif SC", serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.9;
        }
        .container {
            max-width: 520px;
            margin: 0 auto;
            padding: 80px 24px;
        }
        .hint {
            text-align: center;
            font-style: italic;
            color: var(--text-faint);
            font-size: 0.85rem;
            margin-bottom: 32px;
        }
        textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--bg);
            color: var(--text);
            font-size: 0.9rem;
            line-height: 1.8;
            resize: none;
            min-height: 80px;
            font-family: inherit;
            box-sizing: border-box;
            outline: none;
        }
        textarea:focus {
            border-color: var(--text-faint);
        }
        .input-wrap {
            position: relative;
        }
        .submit-btn {
            display: block;
            margin: 12px auto 32px;
            padding: 8px 32px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--bg);
            color: var(--text-muted);
            font-size: 0.85rem;
            cursor: pointer;
            font-family: inherit;
            transition: color 0.3s, border-color 0.3s;
        }
        .submit-btn:hover {
            color: var(--text);
            border-color: var(--text-dim);
        }
        #reveal-wrap {
            display: none;
            max-width: 400px;
            margin: 24px auto 0;
            padding: 32px 28px;
            border: 1px solid var(--border);
            border-radius: 8px;
            text-align: center;
            line-height: 2.4;
            font-size: 0.95rem;
            color: var(--text-soft);
            opacity: 0;
            transition: opacity 1.2s ease;
        }
        #reveal-wrap.show { opacity: 1; }
        #reveal-wrap .gap { display: block; height: 1.5em; }
        #music-toggle {
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-faint);
            cursor: pointer;
            margin-bottom: 24px;
            transition: color 0.3s;
            user-select: none;
        }
        #music-toggle:hover { color: var(--hover); }
        #music-toggle.playing { color: var(--text-muted); }
        #retrieve-link:hover { color: var(--hover) !important; }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 28px;
            font-size: 0.85rem;
            color: var(--text-dim);
            text-decoration: none;
        }
        .back-link:hover { color: var(--hover); }
    </style>
</head>
<body>
    <div class="container">
        <p class="hint">恰似遮不住的青山隐隐，流不断的绿水悠悠</p>

        <p id="music-toggle">♩ 听</p>
        <audio id="bg-music" loop><source src="music.mp3"></audio>
        <p id="retrieve-link" style="display:none;text-align:center;font-size:0.8rem;color:var(--text-faint);cursor:pointer;margin:16px 0 0;transition:color 0.3s;">找回你的文字</p>
        <div id="chat-bubble" style="display:none;position:fixed;right:-320px;top:50%;transform:translateY(-50%);width:300px;max-height:60vh;overflow-y:auto;padding:20px 24px;border:1px solid var(--border);border-radius:12px;background:var(--bg);font-size:0.9rem;color:var(--text-soft);line-height:1.9;z-index:30;transition:right 0.6s ease;box-shadow:0 4px 24px rgba(0,0,0,0.06);"></div>

        <div class="input-wrap">
            <textarea id="msg-input" placeholder="写点什么……"></textarea>
        </div>
        <button class="submit-btn" id="submit-btn">留下</button>

        <div id="reveal-wrap">
            <p>很遗憾，这里不被设置为可以留下文字。</p>
            <span class="gap"></span>
            <p>不过既然你已经走到这儿了——<br>不妨再靠近些。</p>
            <span class="gap"></span>
            <p>有什么想说的，当面去讲吧。<br>找回一位朋友，会让ta开心很久的。</p>
        </div>

        <a class="back-link" href="index.html">leave</a>
        <p id="bottom-links" style="text-align:center;margin-top:12px;display:none;">
            <a class="back-link" href="index.html" style="display:inline;margin-top:0;">芝华塔尼欧</a>
            <span style="color:var(--text-faint);margin:0 8px;">·</span>
            <a class="back-link" href="index.html" style="display:inline;margin-top:0;">Hollywood</a>
        </p>
    </div>

    <script>
        var input = document.getElementById('msg-input');
        var btn = document.getElementById('submit-btn');
        var card = document.getElementById('reveal-wrap');

        var savedText = '';
        btn.addEventListener('click', function() {
            if (card.classList.contains('show')) return;

            savedText = input.value;
            if (!savedText) return;

            btn.style.display = 'none';
            document.getElementById('music-toggle').style.display = 'none';

            // 输入框模糊消散
            input.style.transition = 'opacity 1.8s ease, filter 1.8s ease, transform 1.8s ease';
            input.style.filter = 'blur(5px)';
            input.style.opacity = '0';
            input.style.transform = 'translateY(-15px)';

            // 等待消散完成
            setTimeout(function() {
                input.parentNode.style.display = 'none';
                card.style.display = 'block';
                document.getElementById('bottom-links').style.display = 'block';
                document.getElementById('retrieve-link').style.display = 'block';
                setTimeout(function() { card.classList.add('show'); }, 30);
            }, 2000);

        });

        // 找回文字：点击弹出聊天框
        document.getElementById('retrieve-link').addEventListener('click', function() {
            var bubble = document.getElementById('chat-bubble');
            if (savedText) {
                bubble.innerHTML = savedText.replace(/\n/g, '<br>');
                bubble.style.right = '24px';
            }
        });

        // 点击页面其他区域关闭聊天框
        document.addEventListener('click', function(e) {
            var bubble = document.getElementById('chat-bubble');
            var link = document.getElementById('retrieve-link');
            if (bubble.style.right !== '-320px' && !bubble.contains(e.target) && e.target !== link) {
                bubble.style.right = '-320px';
            }
        });

        // 输入框自动增高
        input.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = this.scrollHeight + 'px';
        });

        // 音乐播放
        var audio = document.getElementById('bg-music');
        var toggle = document.getElementById('music-toggle');
        toggle.addEventListener('click', function() {
            if (audio.paused) {
                audio.play();
                toggle.textContent = '♩ 静音';
                toggle.classList.add('playing');
            } else {
                audio.pause();
                toggle.textContent = '♩ 听';
                toggle.classList.remove('playing');
            }
        });
    </script>
</body>
</html>
