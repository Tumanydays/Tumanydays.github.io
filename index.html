<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tumanydays</title>
    <link rel="icon" type="image/png" href="images/icon.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Serif SC", serif;
            background: #fafafa;
            color: #333;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            text-align: center;
            padding: 48px 32px;
            max-width: 520px;
        }
        h1 {
            font-size: 2rem;
            font-weight: 400;
            letter-spacing: 4px;
            margin-bottom: 12px;
            color: #1a1a1a;
        }
        .tagline {
            font-size: 0.95rem;
            line-height: 1.8;
            color: #888;
            margin-bottom: 36px;
        }
        .dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #bbb;
            border-radius: 50%;
            margin: 24px auto;
        }

        /* 诗句入口：轻盈，不抢眼 */
        .verse-link {
            display: block;
            color: #aaa;
            text-decoration: none;
            font-size: 0.82rem;
            font-style: italic;
            letter-spacing: 1px;
            line-height: 1.8;
            margin-bottom: 28px;
            transition: color 0.3s;
        }
        .verse-link:hover { color: #666; }

        /* 文章链接 */
        .article-link {
            display: block;
            color: #333;
            text-decoration: none;
            font-size: 0.9rem;
            line-height: 1.8;
            margin-bottom: 12px;
        }
        .article-link:hover { color: #1a1a1a; }

        /* 图片入口 */
        .gate-img {
            max-width: 100%;
            border-radius: 8px;
            margin-top: 8px;
            display: block;
            transition: opacity 0.2s;
        }
        .gate-img:hover { opacity: 0.85; }

        footer {
            margin-top: 48px;
            font-size: 0.8rem;
            color: #aaa;
        }
        @media (max-width: 400px) {
            .card { padding: 32px 16px; }
        }
    </style>
</head>
<body>
    <div class="card">

        <h1>Tumanydays</h1>
        <p class="tagline">这里刚刚诞生。<br>就像一颗种子落在泥土里，<br>还没想好要长成什么样子。</p>

        <!-- 诗弦：由 JS 随机填充，点击 → 诗墙 -->
        <a id="verse-spot" class="verse-link" href="poetry/"> </a>

        <span class="dot"></span>

        <!-- 文章入口：由 JS 随机填充 -->
        <a id="article-spot" class="article-link" href="#"></a>

        <span class="dot"></span>

        <!-- 图片入口：由 JS 随机填充 -->
        <a id="image-spot" href="#">
            <img id="image-spot-img" class="gate-img" src="" alt="">
        </a>

        <footer>— 始于 2026.5.28 —</footer>
    </div>

    <!-- ========== 随机抽牌 ========== -->
    <script>
    // ── 第一步：建池子 ──
    // 文章池：每篇文章写 { title: "标题", url: "链接" }
    // 新增文章时，在 ] 前面照格式加一组 { }，注意每组后面有逗号
    var articles = [
        {
            title: "笼中拳手与不飞编队的幽灵：资本主义政府的自主性、美联储的独立性与历史的失忆症",
            url: "logs/观澜/笼中拳手与不飞编队的幽灵.html"
        }
    ];

    // 图片池：每张图片写 { src: "路径", caption: "一句话" }
    // 新增图片时，在 ] 前面照格式加一组 { }
    var images = [
        {
            src: "images/cover_web.jpg",
            caption: ""
        }
    ];

    // 诗句池：从诗词库中精选。新增时在 ] 前面加一行 "诗句",
    var verses = [
        "欲买桂花同载酒，终不似，少年游",
        "小舟从此逝，江海寄余生",
        "我见青山多妩媚，料青山见我应如是",
        "衣带渐宽终不悔，为伊消得人憔悴",
        "悠然心会，妙处难与君说",
        "扣舷独啸，不知今夕何夕",
        "几时归去，作个闲人，对一张琴，一壶酒，一溪云",
        "晓看天色暮看云，行也思君，坐也思君",
        "今宵酒醒何处？杨柳岸，晓风残月",
        "不恨古人吾不见，恨古人不见吾狂耳",
        "素月分辉，明河共影，表里俱澄澈",
        "知我者，二三子"
    ];

    // ── 第二步：抽牌 ──
    function pick(arr) {
        return arr[Math.floor(Math.random() * arr.length)];
    }

    // ── 第三步：挂上去 ──
    var article = pick(articles);
    var image   = pick(images);
    var verse   = pick(verses);

    // 填诗句
    var v = document.getElementById("verse-spot");
    v.textContent = verse;

    // 填文章
    var a = document.getElementById("article-spot");
    a.href = article.url;
    a.textContent = article.title;

    // 填图片
    var imgA = document.getElementById("image-spot");
    imgA.href = "images/";
    var img = document.getElementById("image-spot-img");
    img.src = image.src;
    img.alt = image.caption;
    </script>
</body>
</html>
