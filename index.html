<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tumanydays</title>
    <meta property="og:title" content="Tumanydays">
    <meta property="og:description" content="一个在数字世界里散步的人。八间小屋，一首诗，一些句子。">
    <meta property="og:image" content="https://www.tumanydays.com/images/cover_web.jpg">
    <meta property="og:url" content="https://www.tumanydays.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="images/icon.png">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/0.7.2/p5.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Noto Serif SC", -apple-system, BlinkMacSystemFont, "Segoe UI", serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 背景几何动画 */
        #p5-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }
        .card {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 48px 32px;
            max-width: 520px;
            transform-origin: bottom left;
            will-change: transform;
        }
        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 300;
            font-size: 2rem;
            font-weight: 400;
            letter-spacing: 4px;
            margin-bottom: 52px;
            color: var(--text-title);
        }
        .tagline {
            font-size: 0.95rem;
            line-height: 1.8;
            color: var(--text-muted);
            margin-bottom: 36px;
        }
        .dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: var(--text-faint);
            border-radius: 50%;
            margin: 24px auto;
        }

        /* 诗句入口：轻盈，不抢眼 */
        .verse-link {
            display: block;
            color: var(--text-dim);
            text-decoration: none;
            -webkit-tap-highlight-color: transparent;
            font-size: 0.82rem;
            font-style: italic;
            letter-spacing: 1px;
            line-height: 1.8;
            margin-bottom: 28px;
            transition: color 0.3s;
        }
        .verse-link:hover { color: var(--hover); }

        /* 文章链接 */
        .article-link {
            display: block;
            color: var(--text);
            text-decoration: none;
            -webkit-tap-highlight-color: transparent;
            font-size: 0.9rem;
            line-height: 1.8;
            margin-bottom: 12px;
        }
        .article-link:hover { color: var(--hover); }

        /* 图片入口 */
        .gate-img {
            max-width: 100%;
            border-radius: 8px;
            margin-top: 8px;
            display: block;
            opacity: 0.96;
            transition: opacity 0.3s;
        }
        .gate-img:hover { opacity: 0.82; }

        footer {
            margin-top: 48px;
            font-size: 0.8rem;
            color: var(--text-dim);
        }
        /* 标题也是随处走走的入口 */
        h1 { cursor: pointer; }

        /* ── 彩蛋 ── */
        @keyframes shakeAndDrop {
            0% { transform: translateX(0); opacity: 1; }
            3% { transform: translateX(-10px); }
            6% { transform: translateX(10px); }
            10% { transform: translateX(-8px); }
            14% { transform: translateX(8px); }
            19% { transform: translateX(-6px); }
            24% { transform: translateX(6px); }
            30% { transform: translateX(-4px); }
            36% { transform: translateX(4px); }
            42% { transform: translateX(-3px); }
            47% { transform: translateX(3px); }
            51% { transform: translateX(-2px); }
            54% { transform: translateX(2px); }
            56% { transform: translateX(-1px); }
            58% { transform: translateX(1px); }
            59% { transform: translateX(0); opacity: 1; }
            65% { transform: rotate(6deg); opacity: 0.85; }
            72% { transform: rotate(18deg); opacity: 0.55; }
            80% { transform: rotate(32deg); opacity: 0.25; }
            88% { transform: rotate(42deg); opacity: 0.08; }
            95% { transform: rotate(44.5deg); opacity: 0.02; }
            100% { transform: rotate(45deg); opacity: 0; }
        }
        #easter-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 9998;
            display: none;
            flex-direction: column;
            align-items: flex-end;
            padding: 15vh 20vw 0 0;
            background: rgba(250,250,250,0.72);
            backdrop-filter: blur(3px);
            -webkit-backdrop-filter: blur(3px);
            line-height: 2;
        }
        #easter-overlay .line1 {
            font-family: 'ZCOOL XiaoWei', serif;
            font-size: 1.5rem;
            color: var(--text);
            letter-spacing: 1px;
            opacity: 0;
            transition: opacity 1s ease;
        }
        #easter-overlay .line1.show { opacity: 1; }
        #easter-overlay .line2 {
            font-family: 'ZCOOL XiaoWei', serif;
            font-size: 0.95rem;
            color: var(--text-muted);
            margin-top: 2em;
            text-align: right;
            opacity: 0;
            transition: opacity 1s ease;
        }
        #easter-overlay .line2.show { opacity: 1; }
        #easter-overlay .secret-link {
            color: var(--text);
            text-decoration: underline;
            text-decoration-style: dotted;
            text-underline-offset: 3px;
            cursor: pointer;
        }
        #easter-overlay .secret-link:hover { color: var(--hover); }

        @media (max-width: 400px) {
            .card { padding: 32px 16px; }
        }

    </style>
</head>
<body>
    <div id="page-wrap">
    <div id="p5-bg"></div>
    <div class="card">

        <h1 id="site-title">Tumanydays</h1>
        <p id="tagline-spot" class="tagline"></p>

        <!-- 文章入口：由 JS 随机填充 -->
        <a id="article-spot" class="article-link" href="#"></a>

        <span class="dot"></span>

        <!-- 诗弦：由 JS 随机填充，点击 → 诗墙 -->
        <a id="verse-spot" class="verse-link" href="poetry/"> </a>

        <span class="dot"></span>

        <!-- 图片入口 -->
        <a id="image-spot" href="#">
            <img id="image-spot-img" class="gate-img" src="" alt="">
        </a>

        <footer>— 始于 2026.5.28 —</footer>
    </div>

    </div>

    <div id="easter-overlay">
        <div class="line1" id="easter-line1">似乎发生了一些变化……</div>
        <div class="line2" id="easter-line2">一个<span class="secret-link" id="easter-link">入口</span>被发现了</div>
    </div>

    <!-- ========== 随机抽牌 ========== -->
    <script src="poetry/poems.js"></script>
    <script src="logs/Echo/fragments.js"></script>
    <script>
    // ── 第一步：建池子 ──
    // 文章池：每篇文章写 { title: "标题", url: "链接" }
    // 新增文章时，在 ] 前面照格式加一组 { }，注意每组后面有逗号
    var articles = [
        {
            title: "摘花",
            url: "logs/字渡/摘花.html"
        },
        {
            title: "我是古巴",
            url: "logs/字渡/我是古巴.html"
        },
        {
            title: "我没疯",
            url: "logs/字渡/我没疯.html"
        },
        {
            title: "我有一个梦想",
            url: "logs/字渡/我有一个梦想.html"
        }
    ];

    // 图片池
    var images = [
        {
            src: "images/cover_web.jpg",
            caption: ""
        }
    ];

    // 诗句池：从 poems.js 动态收集（支持 verse 单句和 verses 数组）
    var verses = [];
    poems.forEach(function(p) {
        if (p.verse) verses.push(p.verse);
        if (p.verses) verses = verses.concat(p.verses);
    });

    // ── 第二步：抽牌 ──
    function pick(arr) {
        return arr[Math.floor(Math.random() * arr.length)];
    }

    // ── 第三步：挂上去 ──
    var article = pick(articles);
    var image   = pick(images);
    var verse   = pick(verses);
    var fragment = pick(fragments);

    // 填 tagline：从碎片库随机抽取（优先用 brief 短版）
    var t = document.getElementById("tagline-spot");
    t.innerHTML = fragment.brief || fragment.text.join("<br>");

    // 填诗句
    var v = document.getElementById("verse-spot");
    v.textContent = verse;

    // 填文章
    var a = document.getElementById("article-spot");
    a.href = article.url;
    a.textContent = article.title;

    // ── 随处走走 ──
    var walkPages = [
        "logs/观澜/笼中拳手与不飞编队的幽灵.html",
        "logs/字渡/我没疯.html",
        "logs/字渡/我是古巴.html",
        "logs/字渡/摘花.html",
        "logs/棱镜/一些知识/RSS完全了解指南：信息自主权的最后堡垒.html",
        "logs/棱镜/一些知识/古旧铁轨与万国文字的车厢：ASCII与UTF-8编码的传承、困境与全球方案.html",
        "logs/棱镜/一些知识/从000000到FFFFFF：十六进制颜色码完全手册.html",
        "poetry/index.html",
        "poetry/wall.html",
        "logs/Echo/index.html",
        "poetry/文/吊古战场文.html",
        "logs/index.html"
    ];
    document.getElementById("site-title").addEventListener("click", function() {
        location.href = pick(walkPages);
    });

    // 填图片
    var imgA = document.getElementById("image-spot");
    imgA.href = "images/";
    var img = document.getElementById("image-spot-img");
    img.src = image.src;
    img.alt = image.caption;
    </script>

    <script>
    // ── 指针／触摸追踪（仅桌面端，移动端不产生惊动）──
    var isTouch = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
    var gMouseX = 0, gMouseY = 0, gLastMouseX = 0, gLastMouseY = 0;
    if (!isTouch) {
        document.addEventListener('mousemove', function(e) {
            gMouseX = e.clientX;
            gMouseY = e.clientY;
        });
    }
    </script>

    <script>
    // ═══ 背景几何动画 ═══
    // 极简灰调，Dave Whyte / beesandbombs.com 灵感
    var sketch = function(p) {
        var t, speed = 2e-5;
        var l = 80;
        var rads = [];
        var flutter = 0;

        p.setup = function() {
            var canvas = p.createCanvas(p.windowWidth, p.windowHeight);
            canvas.parent('p5-bg');
            p.colorMode(p.HSB, 1);
            p.strokeWeight(0.4);
            for (var i = 3; i < 11; i++) {
                rads[i] = l / (2 * p.tan(p.PI / i));
            }
            if (!isTouch) {
                gLastMouseX = gMouseX;
                gLastMouseY = gMouseY;
            }
        };
        p.draw = function() {
            // 极轻惊动：仅桌面端，移动端圆点匀速运动
            var speedMod = 1;
            if (!isTouch) {
                var mv = p.dist(gMouseX, gMouseY, gLastMouseX, gLastMouseY);
                gLastMouseX = gMouseX;
                gLastMouseY = gMouseY;
                var distFromCenter = p.dist(gMouseX, gMouseY, p.width / 2, p.height / 2);
                var triggerRadius = p.min(p.width, p.height) * 0.4;
                var atten = 1 - p.max(0, distFromCenter - triggerRadius) / triggerRadius;
                atten = p.constrain(atten, 0, 1);
                flutter += mv * 0.0005 * atten;
                flutter = p.lerp(flutter, 0, 0.25);
                flutter = p.constrain(flutter, 0, 0.02);
                speedMod = 1 + flutter;
            }

            t = speed * p.millis();
            p.background(250 / 255);
            p.push();
            p.translate(p.width / 2, p.height / 2);
            var s = p.min(p.width, p.height) / 500;
            p.scale(s);
            for (var i = 10; i > 2; i--) {
                var b = p.map(i, 3, 11, 0.72, 0.92);
                p.stroke(0, 0, b);
                poly(i);
            }
            for (var i = 3; i < 11; i++) {
                p.fill(0, 0, 0.35);
                dott(i, (11 - i) * t * speedMod);
            }
            p.pop();
        };

        p.windowResized = function() {
            p.resizeCanvas(p.windowWidth, p.windowHeight);
        };

        function poly(N) {
            for (var i = 0; i < N; i++) {
                p.push();
                p.rotate(p.TWO_PI * i / N);
                p.line(-l / 2, rads[N], l / 2, rads[N]);
                p.pop();
            }
        }

        function dott(N, q) {
            q = (q + 0.5 / N) % 1;
            var qq = (q * N) % 1;
            var rot = Math.floor(q * N);
            p.push();
            p.rotate(p.TWO_PI * rot / N);
            p.noStroke();
            p.ellipse(p.lerp(l / 2, -l / 2, qq), rads[N], l * 0.1, l * 0.1);
            p.pop();
        }
    };
    new p5(sketch);
    </script>

    <script>
    // ═══ 彩蛋 ═══
    (function() {
        var triggered = false;
        var overlay = document.getElementById('easter-overlay');
        var line1 = document.getElementById('easter-line1');
        var line2 = document.getElementById('easter-line2');

        function reveal() {
            if (triggered) return;
            triggered = true;
            var card = document.querySelector('.card');
            if (card) card.style.animation = 'shakeAndDrop 5.5s cubic-bezier(0.4, 0, 0.2, 1) forwards';
            setTimeout(function() {
                if (card) card.style.display = 'none';
                overlay.style.display = 'flex';
                setTimeout(function() { line1.classList.add('show'); }, 50);
                setTimeout(function() {
                    line2.classList.add('show');
                    document.getElementById('easter-link').addEventListener('click', function() {
                        location.href = 'secret.html';
                    });
                }, 3000);
            }, 5500);
        }

        // ── 触发方式一：键盘输入 "la la land" ──
        var keys = 'la la land';
        var ki = 0;
        document.addEventListener('keydown', function(e) {
            if (triggered) return;
            var k = e.key && e.key.toLowerCase();
            if (k && k.length === 1 && k === keys[ki]) {
                ki++;
                if (ki === keys.length) reveal();
            } else {
                ki = 0;
                if (k && k === keys[0]) ki = 1;
            }
        });

        // ── 触发方式二：连点 footer 两次 → 再点图片 ──
        var step = 0, tapTimer;
        var footer = document.querySelector('footer');
        var imgLink = document.getElementById('image-spot');
        if (footer) {
            footer.addEventListener('click', function() {
                if (triggered) return;
                clearTimeout(tapTimer);
                if (step === 0) {
                    step = 1;
                    tapTimer = setTimeout(function() { step = 0; }, 600);
                } else if (step === 1) {
                    step = 2;
                    tapTimer = setTimeout(function() { step = 0; }, 2000);
                }
            });
        }
        if (imgLink) {
            imgLink.addEventListener('click', function() {
                if (triggered) return;
                if (step === 2) {
                    step = 0;
                    clearTimeout(tapTimer);
                    reveal();
                }
            });
        }
    })();
    </script>
</body>
</html>
