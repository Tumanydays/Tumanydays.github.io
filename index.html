<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tumanydays</title>
    <link rel="icon" type="image/png" href="images/favicon.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Serif SC", serif;
            background: #fafafa;
            color: #333;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            text-align: center;
            padding: 48px 32px;
            max-width: 520px;
        }
        .cover-img {
            max-width: 100%;
            border-radius: 8px;
            margin-bottom: 32px;
        }
        h1 {
            font-size: 2rem;
            font-weight: 400;
            letter-spacing: 4px;
            margin-bottom: 12px;
            color: #1a1a1a;
        }
        .tagline {
            font-size: 0.95rem;
            line-height: 1.8;
            color: #888;
            margin-bottom: 36px;
        }
        .dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #bbb;
            border-radius: 50%;
            margin: 24px auto;
        }

        /* 文章链接 */
        .article-link {
            display: block;
            color: #333;
            text-decoration: none;
            font-size: 0.9rem;
            line-height: 1.8;
            margin-bottom: 12px;
        }
        .article-link:hover { color: #1a1a1a; }

        /* 图片入口 */
        .gate-img {
            max-width: 100%;
            border-radius: 8px;
            margin-top: 8px;
            display: block;
            transition: opacity 0.2s;
        }
        .gate-img:hover { opacity: 0.85; }

        footer {
            margin-top: 48px;
            font-size: 0.8rem;
            color: #aaa;
        }
        @media (max-width: 400px) {
            .card { padding: 32px 16px; }
        }
    </style>
</head>
<body>
    <div class="card">
      
        <h1>Tumanydays</h1>
        <p class="tagline">这里刚刚诞生。<br>就像一颗种子落在泥土里，<br>还没想好要长成什么样子。</p>

        <span class="dot"></span>

        <!-- 文章入口 → 日志板块 -->
        <a class="article-link" href="logs/观澜/笼中拳手与不飞编队的幽灵.html">
            笼中拳手与不飞编队的幽灵：资本主义政府的自主性、美联储的独立性与历史的失忆症
        </a>

        <span class="dot"></span>

        <!-- 图片入口 → 图片板块 -->
        <a href="images/">
            <img class="gate-img" src="images/cover_web.jpg" alt="进入图片板块">
        </a>

        <footer>— 始于 2026.5.28 —</footer>
    </div>
</body>
</html>
