<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tumanydays</title>
    <meta property="og:title" content="Tumanydays">
    <meta property="og:description" content="一个在数字世界里散步的人。八间小屋，一首诗，一些句子。">
    <meta property="og:image" content="https://www.tumanydays.com/images/cover_web.jpg">
    <meta property="og:url" content="https://www.tumanydays.com">
    <link rel="icon" type="image/png" href="images/icon.png">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/0.7.2/p5.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Serif SC", serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 背景几何动画 */
        #p5-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }
        .card {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 48px 32px;
            max-width: 520px;
        }
        h1 {
            font-size: 2rem;
            font-weight: 400;
            letter-spacing: 4px;
            margin-bottom: 52px;
            color: var(--text-title);
        }
        .tagline {
            font-size: 0.95rem;
            line-height: 1.8;
            color: var(--text-muted);
            margin-bottom: 36px;
        }
        .dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: var(--text-faint);
            border-radius: 50%;
            margin: 24px auto;
        }

        /* 诗句入口：轻盈，不抢眼 */
        .verse-link {
            display: block;
            color: var(--text-dim);
            text-decoration: none;
            -webkit-tap-highlight-color: transparent;
            font-size: 0.82rem;
            font-style: italic;
            letter-spacing: 1px;
            line-height: 1.8;
            margin-bottom: 28px;
            transition: color 0.3s;
        }
        .verse-link:hover { color: var(--hover); }

        /* 文章链接 */
        .article-link {
            display: block;
            color: var(--text);
            text-decoration: none;
            -webkit-tap-highlight-color: transparent;
            font-size: 0.9rem;
            line-height: 1.8;
            margin-bottom: 12px;
        }
        .article-link:hover { color: var(--hover); }

        /* 图片入口 */
        .gate-img {
            max-width: 100%;
            border-radius: 8px;
            margin-top: 8px;
            display: block;
            opacity: 0.96;
            transition: opacity 0.3s;
        }
        .gate-img:hover { opacity: 0.82; }

        footer {
            margin-top: 48px;
            font-size: 0.8rem;
            color: var(--text-dim);
        }
        @media (max-width: 400px) {
            .card { padding: 32px 16px; }
        }

    </style>
</head>
<body>
    <div id="p5-bg"></div>
    <div class="card">

        <h1>Tumanydays</h1>
        <p id="tagline-spot" class="tagline"></p>

        <!-- 文章入口：由 JS 随机填充 -->
        <a id="article-spot" class="article-link" href="#"></a>

        <span class="dot"></span>

        <!-- 诗弦：由 JS 随机填充，点击 → 诗墙 -->
        <a id="verse-spot" class="verse-link" href="poetry/"> </a>

        <span class="dot"></span>

        <!-- 图片入口 -->
        <a id="image-spot" href="#">
            <img id="image-spot-img" class="gate-img" src="" alt="">
        </a>

        <footer>— 始于 2026.5.28 —</footer>
    </div>

    <!-- ========== 随机抽牌 ========== -->
    <script src="poetry/poems.js"></script>
    <script src="logs/Echo/fragments.js"></script>
    <script>
    // ── 第一步：建池子 ──
    // 文章池：每篇文章写 { title: "标题", url: "链接" }
    // 新增文章时，在 ] 前面照格式加一组 { }，注意每组后面有逗号
    var articles = [
        {
            title: "摘花",
            url: "logs/字渡/摘花.html"
        },
        {
            title: "我是古巴",
            url: "logs/字渡/我是古巴.html"
        },
        {
            title: "我没疯",
            url: "logs/字渡/我没疯.html"
        }
    ];

    // 图片池
    var images = [
        {
            src: "images/cover_web.jpg",
            caption: ""
        }
    ];

    // 诗句池：从 poems.js 动态收集（支持 verse 单句和 verses 数组）
    var verses = [];
    poems.forEach(function(p) {
        if (p.verse) verses.push(p.verse);
        if (p.verses) verses = verses.concat(p.verses);
    });

    // ── 第二步：抽牌 ──
    function pick(arr) {
        return arr[Math.floor(Math.random() * arr.length)];
    }

    // ── 第三步：挂上去 ──
    var article = pick(articles);
    var image   = pick(images);
    var verse   = pick(verses);
    var fragment = pick(fragments);

    // 填 tagline：从碎片库随机抽取（优先用 brief 短版）
    var t = document.getElementById("tagline-spot");
    t.innerHTML = fragment.brief || fragment.text.join("<br>");

    // 填诗句
    var v = document.getElementById("verse-spot");
    v.textContent = verse;

    // 填文章
    var a = document.getElementById("article-spot");
    a.href = article.url;
    a.textContent = article.title;

    // 填图片
    var imgA = document.getElementById("image-spot");
    imgA.href = "images/";
    var img = document.getElementById("image-spot-img");
    img.src = image.src;
    img.alt = image.caption;
    </script>

    <script>
    // ── 指针／触摸追踪（仅桌面端，移动端不产生惊动）──
    var isTouch = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
    var gMouseX = 0, gMouseY = 0, gLastMouseX = 0, gLastMouseY = 0;
    if (!isTouch) {
        document.addEventListener('mousemove', function(e) {
            gMouseX = e.clientX;
            gMouseY = e.clientY;
        });
    }
    </script>

    <script>
    // ═══ 背景几何动画 ═══
    // 极简灰调，Dave Whyte / beesandbombs.com 灵感
    var sketch = function(p) {
        var t, speed = 2e-5;
        var l = 80;
        var rads = [];
        var flutter = 0;

        p.setup = function() {
            var canvas = p.createCanvas(p.windowWidth, p.windowHeight);
            canvas.parent('p5-bg');
            p.colorMode(p.HSB, 1);
            p.strokeWeight(0.4);
            for (var i = 3; i < 11; i++) {
                rads[i] = l / (2 * p.tan(p.PI / i));
            }
            if (!isTouch) {
                gLastMouseX = gMouseX;
                gLastMouseY = gMouseY;
            }
        };
            // 极轻惊动：仅桌面端，移动端圆点匀速运动
            var speedMod = 1;
            if (!isTouch) {
                var mv = p.dist(gMouseX, gMouseY, gLastMouseX, gLastMouseY);
                gLastMouseX = gMouseX;
                gLastMouseY = gMouseY;
                var distFromCenter = p.dist(gMouseX, gMouseY, p.width / 2, p.height / 2);
                var triggerRadius = p.min(p.width, p.height) * 0.4;
                var atten = 1 - p.max(0, distFromCenter - triggerRadius) / triggerRadius;
                atten = p.constrain(atten, 0, 1);
                flutter += mv * 0.0005 * atten;
                flutter = p.lerp(flutter, 0, 0.25);
                flutter = p.constrain(flutter, 0, 0.02);
                speedMod = 1 + flutter;
            }

            t = speed * p.millis();
            p.background(250 / 255);
            p.push();
            p.translate(p.width / 2, p.height / 2);
            var s = p.min(p.width, p.height) / 500;
            p.scale(s);
            for (var i = 10; i > 2; i--) {
                var b = p.map(i, 3, 11, 0.72, 0.92);
                p.stroke(0, 0, b);
                poly(i);
            }
            for (var i = 3; i < 11; i++) {
                p.fill(0, 0, 0.35);
                dott(i, (11 - i) * t * speedMod);
            }
            p.pop();
        };

        p.windowResized = function() {
            p.resizeCanvas(p.windowWidth, p.windowHeight);
        };

        function poly(N) {
            for (var i = 0; i < N; i++) {
                p.push();
                p.rotate(p.TWO_PI * i / N);
                p.line(-l / 2, rads[N], l / 2, rads[N]);
                p.pop();
            }
        }

        function dott(N, q) {
            q = (q + 0.5 / N) % 1;
            var qq = (q * N) % 1;
            var rot = Math.floor(q * N);
            p.push();
            p.rotate(p.TWO_PI * rot / N);
            p.noStroke();
            p.ellipse(p.lerp(l / 2, -l / 2, qq), rads[N], l * 0.1, l * 0.1);
            p.pop();
        }
    };
    new p5(sketch);
    </script>
</body>
</html>
