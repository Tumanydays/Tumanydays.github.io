<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tumanydays</title>
    <meta property="og:title" content="Tumanydays">
    <meta property="og:description" content="一个在数字世界里散步的人。八间小屋，一首诗，一些句子。">
    <meta property="og:image" content="https://www.tumanydays.com/images/cover_web.jpg">
    <meta property="og:url" content="https://www.tumanydays.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="images/icon.png">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/0.7.2/p5.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Noto Serif SC", -apple-system, BlinkMacSystemFont, "Segoe UI", serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 背景几何动画 */
        #p5-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }
        .card {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 48px 32px;
            max-width: 520px;
            transform-origin: bottom left;
            will-change: transform;
        }
        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 300;
            font-size: 2rem;
            font-weight: 400;
            letter-spacing: 4px;
            margin-bottom: 52px;
            color: var(--text-title);
            white-space: nowrap;
            user-select: none;
            -webkit-user-select: none;
        }
        h1 .char {
            display: inline-block;
            vertical-align: baseline;
        }
        .tagline {
            font-size: 0.95rem;
            line-height: 1.8;
            color: var(--text-muted);
            margin-bottom: 36px;
        }
        .dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: var(--text-faint);
            border-radius: 50%;
            margin: 24px auto;
        }

        /* 诗句入口：轻盈，不抢眼 */
        .verse-link {
            display: block;
            color: var(--text-dim);
            text-decoration: none;
            -webkit-tap-highlight-color: transparent;
            font-family: 'ZCOOL XiaoWei', 'Noto Serif SC', serif;
            font-size: 0.85rem;
            font-weight: 400;
            letter-spacing: 1.5px;
            line-height: 1.8;
            margin-bottom: 28px;
            transition: color 0.3s;
        }
        .verse-link:hover { color: var(--hover); }

        /* 文章链接 */
        .article-link {
            display: block;
            color: var(--text-soft);
            text-decoration: none;
            -webkit-tap-highlight-color: transparent;
            font-size: 0.9rem;
            line-height: 1.8;
            margin-bottom: 12px;
        }
        .article-link:hover { color: var(--hover); }

        /* 图片入口 */
        .gate-img {
            max-width: 100%;
            border-radius: 8px;
            margin-top: 8px;
            display: block;
            opacity: 0.96;
            transition: opacity 0.3s;
        }
        .gate-img:hover { opacity: 0.82; }

        footer {
            margin-top: 48px;
            font-size: 0.8rem;
            color: var(--text-dim);
        }
        /* 标题也是随处走走的入口 */
        h1 { cursor: pointer; }

        /* ── 彩蛋 ── */
        @keyframes shakeAndDrop {
            0% { transform: translateX(0); opacity: 1; }
            3% { transform: translateX(-10px); }
            6% { transform: translateX(10px); }
            10% { transform: translateX(-8px); }
            14% { transform: translateX(8px); }
            19% { transform: translateX(-6px); }
            24% { transform: translateX(6px); }
            30% { transform: translateX(-4px); }
            36% { transform: translateX(4px); }
            42% { transform: translateX(-3px); }
            47% { transform: translateX(3px); }
            51% { transform: translateX(-2px); }
            54% { transform: translateX(2px); }
            56% { transform: translateX(-1px); }
            58% { transform: translateX(1px); }
            59% { transform: translateX(0); opacity: 1; }
            65% { transform: rotate(6deg); opacity: 0.85; }
            72% { transform: rotate(18deg); opacity: 0.55; }
            80% { transform: rotate(32deg); opacity: 0.25; }
            88% { transform: rotate(42deg); opacity: 0.08; }
            95% { transform: rotate(44.5deg); opacity: 0.02; }
            100% { transform: rotate(45deg); opacity: 0; }
        }
        #easter-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 9998;
            display: none;
            flex-direction: column;
            align-items: flex-end;
            padding: 15vh 20vw 0 0;
            background: rgba(250,250,250,0.72);
            backdrop-filter: blur(3px);
            -webkit-backdrop-filter: blur(3px);
            line-height: 2;
        }
        #easter-overlay .line1 {
            font-family: 'ZCOOL XiaoWei', serif;
            font-size: 1.5rem;
            color: var(--text);
            letter-spacing: 1px;
            opacity: 0;
            transition: opacity 1s ease;
        }
        #easter-overlay .line1.show { opacity: 1; }
        #easter-overlay .line2 {
            font-family: 'ZCOOL XiaoWei', serif;
            font-size: 0.95rem;
            color: var(--text-muted);
            margin-top: 2em;
            text-align: right;
            opacity: 0;
            transition: opacity 1s ease;
        }
        #easter-overlay .line2.show { opacity: 1; }
        #easter-overlay .secret-link {
            color: var(--text);
            text-decoration: underline;
            text-decoration-style: dotted;
            text-underline-offset: 3px;
            cursor: pointer;
        }
        #easter-overlay .secret-link:hover { color: var(--hover); }

        @media (max-width: 400px) {
            .card { padding: 32px 16px; }
        }

    </style>
</head>

    var a = document.getElementById("article-spot");

    // ── 随处走走 ──
    var walkPages = [

        "logs/棱镜/一些知识/从000000到FFFFFF：十六进制颜色码完全手册.html",
        "poetry/index.html",

        "logs/月光/彼岸的故乡：德沃夏克E小调第九交响曲「自新大陆」聆听指南.html",
        "logs/月光/乐理小册/音乐的骨架：古典音乐常见体裁入门.html",

    document.getElementById("site-title").addEventListener("click", function() {
        if (window._dragSuppressClick) { window._dragSuppressClick = false; return; }
        location.href = pick(walkPages);

    // 填图片
    var imgA = document.getElementById("image-spot");

    <!-- ================================================================
        第二部分：鼠标位置追踪
        供后续 p5.js 动画和标题拖拽使用
        ================================================================ -->
    <script>
    // ── 指针／触摸追踪 ──
    var isTouch = window.matchMedia('(pointer:coarse)').matches || 'ontouchstart' in window;
    </script>

    <!-- ================================================================
        第三部分：p5.js 背景几何动画
        3-10 边同心多边形，灰色调
        ================================================================ -->
    <script>
    // ═══ 背景几何动画 ═══
    // 极简灰调，Dave Whyte / beesandbombs.com 灵感
    var sketch = function(p) {
        var t, speed = 2e-5;
        var l = 80;
        var rads = [];
        var dream = 0;        // 0=无, 1=边在抖, 2=点走神
        var dreamN = 3;       // 做梦的多边形
        var dreamE = 0;       // 做梦的边（仅 dream=1）
        var dreamT = 0;       // 梦境计时
        var dreamP = 0;       // 梦境相位

        p.setup = function() {
            var canvas = p.createCanvas(p.windowWidth, p.windowHeight);
            canvas.parent('p5-bg');
            p.colorMode(p.HSB, 1);
            p.strokeWeight(0.4);
            for (var i = 3; i < 11; i++) {
                rads[i] = l / (2 * p.tan(p.PI / i));
            }
        };
        p.draw = function() {
            var s = p.min(p.width, p.height) / 500;

            t = speed * p.millis();
            p.background(250 / 255);
            p.push();
            p.translate(p.width / 2, p.height / 2);
            p.scale(s);
            for (var i = 10; i > 2; i--) {
                var b = p.map(i, 3, 11, 0.72, 0.92);
                p.stroke(0, 0, b);
                poly(i);
            }
            for (var i = 3; i < 11; i++) {
                p.fill(0, 0, 0.35);
                dott(i, (11 - i) * t, dream === 2 && dreamN === i);
            }
            p.pop();

            // ── 首页梦见其他房间（极低概率，每次都不一样）──
            if (!dream && Math.random() < 0.00056) {
                dream = 1 + Math.floor(Math.random() * 2);
                dreamN = 3 + Math.floor(Math.random() * 8);
                dreamE = Math.floor(Math.random() * dreamN);
                dreamT = 30 + Math.floor(Math.random() * 40);
                dreamP = Math.random() * 6.28;
            }
            if (dream) {
                dreamT--;
                if (dreamT <= 0) { dream = 0; }
            }
        };

        p.windowResized = function() {
            p.resizeCanvas(p.windowWidth, p.windowHeight);
        };

        function poly(N) {
            for (var i = 0; i < N; i++) {
                p.push();
                p.rotate(p.TWO_PI * i / N);
                if (dream === 1 && dreamN === N && i === dreamE) {
                    // 梦见：一条边微微颤抖
                    var wiggle = Math.sin(dreamP + dreamT * 0.3) * 6 * (dreamT / 70);
                    p.line(-l / 2, rads[N], 0, rads[N] + wiggle);
                    p.line(0, rads[N] + wiggle, l / 2, rads[N]);
                } else {
                    p.line(-l / 2, rads[N], l / 2, rads[N]);
                }
                p.pop();
            }
        }

        function dott(N, q, isDreaming) {
            q = (q + 0.5 / N) % 1;
            var qq = (q * N) % 1;
            var rot = Math.floor(q * N);
            var offX = 0, offY = 0;
            if (isDreaming) {
                // 梦见：圆点短暂偏离轨道，像走神
                var drift = Math.sin(dreamP + dreamT * 0.2) * 12 * (dreamT / 70);
                offX = Math.cos(dreamP + dreamT * 0.15) * drift;
                offY = Math.sin(dreamP + dreamT * 0.25) * drift;
            }
            p.push();
            p.rotate(p.TWO_PI * rot / N);
            var bx = p.lerp(l / 2, -l / 2, qq);
            var by = rads[N];
            p.noStroke();
            p.ellipse(bx + offX, by + offY, l * 0.1, l * 0.1);
            p.pop();
        }
    };
    new p5(sketch);
    </script>

    <!-- ================================================================
        第四部分：彩蛋 + 迷失域入口
        - 触发方式一：键盘输入 "la la land"
        - 触发方式二：拖拽标题
          · 往右下极限 → 彩蛋 (secret.html)
          · 往右直拖 250px+ → 迷失域
        ================================================================ -->
    <script>
    // ═══ 彩蛋 + 迷失域入口 ═══
    (function() {
        var triggered = false;
        var overlay = document.getElementById('easter-overlay');
        var line1 = document.getElementById('easter-line1');
        var line2 = document.getElementById('easter-line2');

        function reveal() {
            if (triggered) return;
            triggered = true;
            var card = document.querySelector('.card');
            if (card) card.style.animation = 'shakeAndDrop 5.5s cubic-bezier(0.4, 0, 0.2, 1) forwards';
            setTimeout(function() {
                if (card) card.style.display = 'none';
                overlay.style.display = 'flex';
                setTimeout(function() { line1.classList.add('show'); }, 50);
                setTimeout(function() {
                    line2.classList.add('show');
                    document.getElementById('easter-link').addEventListener('click', function() {
                        location.href = 'secret.html';
                    });
                }, 3000);
            }, 5500);
        }

        // ── 触发方式一：键盘输入 "la la land" ──
        var keys = 'la la land';
        var ki = 0;
        document.addEventListener('keydown', function(e) {
            if (triggered) return;
            var k = e.key && e.key.toLowerCase();
            if (k && k.length === 1 && k === keys[ki]) {
                ki++;
                if (ki === keys.length) reveal();
            } else {
                ki = 0;
                if (k && k === keys[0]) ki = 1;
            }
        });

        // ── 触发方式二：拉扯标题（往右下方，像一根被拉紧的弦）──
        var titleEl = document.getElementById('site-title');
        // 将标题拆分为逐字符 span
        var charEls = [];
        var titleText = titleEl.textContent;
        titleEl.textContent = '';
        for (var ci = 0; ci < titleText.length; ci++) {
            var sp = document.createElement('span');
            sp.className = 'char';
            sp.textContent = titleText[ci];
            titleEl.appendChild(sp);
            charEls.push(sp);
        }
        var CHAR_N = charEls.length;

        var dragX = 0, dragY = 0, isDragging = false;
        var wasDragged = false, wasEffectApplied = false;
        var MAX_DRAG = 300, DEAD_ZONE = 8;

        function getDragPos(e) {
            return e.touches
                ? { x: e.touches[0].clientX, y: e.touches[0].clientY }
                : { x: e.clientX, y: e.clientY };
        }

        // 重置所有字符为初始状态
        function resetChars() {
            for (var ci = 0; ci < CHAR_N; ci++) {
                charEls[ci].style.transform = '';
                charEls[ci].style.color = '';
            }
        }

        // 标题散落动画——像拉扯断了，字母碎落在原地
        function shatterTitle() {
            charEls.forEach(function(el, i) {
                var tilt = (Math.random() - 0.5) * 40;
                var fall = 8 + Math.random() * 28;
                var shift = (Math.random() - 0.5) * 18;
                var dim = 0.25 + Math.random() * 0.35;
                el.style.transition = 'transform 0.6s cubic-bezier(.22,.68,0,1), opacity 0.6s ease';
                el.style.transform = 'translate(' + shift.toFixed(1) + 'px,' + fall.toFixed(1) + 'px) rotate(' + tilt.toFixed(1) + 'deg)';
                el.style.opacity = dim.toFixed(2);
            });
        }

        // 暴露重置函数，供 wander-mode.js 在退出时调用
        window._resetWanderTitle = function() {
            charEls.forEach(function(el) {
                el.style.transition = '';
                el.style.transform = '';
                el.style.opacity = '';
            });
        };

        // Q弹弹簧回弹——距离越远，弹得越浪（标准弹簧模型）
        function jellyReset() {
            var states = [];
            var hasMotion = false;
            var totalDist = 0;
            for (var ci = 0; ci < CHAR_N; ci++) {
                var el = charEls[ci];
                var tx = 0, ty = 0;
                var m = el.style.transform
                    && el.style.transform.match(/translate\(([^,]+)px,([^)]+)px\)/);
                if (m) { tx = parseFloat(m[1]); ty = parseFloat(m[2]); }
                var d = Math.sqrt(tx*tx + ty*ty);
                if (d > 0.5) hasMotion = true;
                totalDist += d;
                var cm = el.style.color && el.style.color.match(/rgb\((\d+),/);
                var cv = cm ? parseInt(cm[1]) : 26;
                states.push({ tx: tx, ty: ty, c: cv });
            }
            if (!hasMotion) { resetChars(); return; }

            var avgDist = totalDist / CHAR_N;
            var initStates = states.map(function(s) { return { tx: s.tx, ty: s.ty, c: s.c }; });

            // 弹簧参数随距离变化（标准 accel = -k*x - d*v 模型）
            var t = Math.min(avgDist / 60, 1);
            var k = 0.02 + 0.005 * t;         // 0.020→0.025，更硬过冲转折更快
            var d = 0.12 - 0.095 * t;           // 0.12→0.025，短距紧长距浪
            var pos = 1, vel = -t * 0.08 - 0.02;

            (function tick() {
                var extra = pos < 0 ? -0.3 * pos * pos * pos : 0;  // 过冲时非线性回复，减少停留
                var accel = -k * pos + extra - d * vel;
                vel += accel;
                pos += vel;

                if (Math.abs(pos) < 0.002 && Math.abs(vel) < 0.005) { resetChars(); return; }

                var p = Math.min(Math.max(pos, -0.3), 1);  // 允许 30% 反向过冲

                for (var ci = 0; ci < CHAR_N; ci++) {
                    var st = initStates[ci];
                    var tx = st.tx * p;
                    var ty = st.ty * p;
                    var c = Math.round(26 + (st.c - 26) * Math.abs(p));
                    charEls[ci].style.transform = 'translate(' + tx.toFixed(1) + 'px,' + ty.toFixed(1) + 'px)';
                    charEls[ci].style.color = 'rgb(' + c + ',' + c + ',' + c + ')';
                }

                requestAnimationFrame(tick);
            })();
        }

        function onTitleDown(e) {
            if (triggered) return;
            resetChars();
            var pos = getDragPos(e);
            dragX = pos.x;
            dragY = pos.y;
            isDragging = true;
            wasDragged = false;
            wasEffectApplied = false;
            // 桌面端阻止文字选中，移动端保留 click 事件
            if (e.type === 'mousedown') e.preventDefault();
        }

        function onTitleMove(e) {
            if (!isDragging || triggered) return;
            e.preventDefault();
            var pos = getDragPos(e);
            var dx = pos.x - dragX;
            var dy = pos.y - dragY;

            var dist = Math.sqrt(dx * dx + dy * dy);
            if (dist <= DEAD_ZONE) return;
            wasDragged = true;
            wasEffectApplied = true;

            var progress = Math.min(dist / MAX_DRAG, 1);
            var eased = progress * progress * (3 - 2 * progress);

            // 方向随实际拖拽
            var angle = Math.atan2(dy, dx);
            var totalSkew = eased * 14;
            var skewX = totalSkew * Math.cos(angle);
            var skewY = totalSkew * Math.sin(angle);

            var totalTx = dx * 0.2;
            var totalTy = dy * 0.2;

            // 逐字符：越靠右的字母位移越大
            for (var ci = 0; ci < CHAR_N; ci++) {
                var factor = Math.pow(ci / (CHAR_N - 1), 1.3);
                var cTx = totalTx * factor;
                var cTy = totalTy * factor;
                var cSkewX = skewX * factor;
                var cSkewY = skewY * factor;
                var c = Math.round(26 + 188 * eased * factor);

                charEls[ci].style.transform = 'translate(' + cTx.toFixed(1) + 'px,' + cTy.toFixed(1) + 'px) skew(' + cSkewX.toFixed(1) + 'deg,' + cSkewY.toFixed(1) + 'deg)';
                charEls[ci].style.color = 'rgb(' + c + ',' + c + ',' + c + ')';
            }

            // 向右直拖较远 → 进入迷失域
            if (dx > 250 && Math.abs(dy) < 80 && !triggered) {
                isDragging = false;
                wasDragged = false;
                wasEffectApplied = false;
                resetChars();
                sessionStorage.setItem('wander-mode', 'true');
                shatterTitle();
                return;
            }

            // 只有往右下方拉到极限才触发彩蛋
            if (dx > DEAD_ZONE && dy > DEAD_ZONE && progress >= 1) {
                isDragging = false;
                wasDragged = false;
                wasEffectApplied = false;
                resetChars();
                reveal();
            }
        }

        function onTitleUp(e) {
            if (!isDragging) return;
            isDragging = false;
            if (wasDragged && wasEffectApplied) {
                window._dragSuppressClick = true;
                jellyReset();
            }
        }

        if (titleEl) {
            titleEl.addEventListener('mousedown', onTitleDown);
            titleEl.addEventListener('touchstart', onTitleDown, { passive: false });
            document.addEventListener('mousemove', onTitleMove);
            document.addEventListener('touchmove', onTitleMove, { passive: false });
            document.addEventListener('mouseup', onTitleUp);
            document.addEventListener('touchend', onTitleUp);
        }
    })();
    </script>
<!-- ================================================================
        共享组件：迷失域
        wander-mode.js 必须在最后加载（依赖 _resetWanderTitle）
        ================================================================ -->
<script src="wander-mode.js"></script>
</body>
