<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tumanydays</title>
    <link rel="icon" type="image/png" href="images/icon.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Serif SC", serif;
            background: #fafafa;
            color: #333;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            text-align: center;
            padding: 48px 32px;
            max-width: 520px;
        }
        h1 {
            font-size: 2rem;
            font-weight: 400;
            letter-spacing: 4px;
            margin-bottom: 12px;
            color: #1a1a1a;
        }
        .tagline {
            font-size: 0.95rem;
            line-height: 1.8;
            color: #888;
            margin-bottom: 36px;
        }
        .dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #bbb;
            border-radius: 50%;
            margin: 24px auto;
        }

        /* 文章链接 */
        .article-link {
            display: block;
            color: #333;
            text-decoration: none;
            font-size: 0.9rem;
            line-height: 1.8;
            margin-bottom: 12px;
        }
        .article-link:hover { color: #1a1a1a; }

        /* 图片入口 */
        .gate-img {
            max-width: 100%;
            border-radius: 8px;
            margin-top: 8px;
            display: block;
            transition: opacity 0.2s;
        }
        .gate-img:hover { opacity: 0.85; }

        footer {
            margin-top: 48px;
            font-size: 0.8rem;
            color: #aaa;
        }
        @media (max-width: 400px) {
            .card { padding: 32px 16px; }
        }
    </style>
</head>
<body>
    <div class="card">

        <h1>Tumanydays</h1>
        <p class="tagline">这里刚刚诞生。<br>就像一颗种子落在泥土里，<br>还没想好要长成什么样子。</p>

        <span class="dot"></span>

        <!-- 文章入口：由 JS 随机填充 -->
        <a id="article-spot" class="article-link" href="#"></a>

        <span class="dot"></span>

        <!-- 图片入口：由 JS 随机填充 -->
        <a id="image-spot" href="#">
            <img id="image-spot-img" class="gate-img" src="" alt="">
        </a>

        <footer>— 始于 2026.5.28 —</footer>
    </div>

    <!-- ========== 随机抽牌 ========== -->
    <script>
    // ── 第一步：建池子 ──
    // 文章池：每篇文章写 { title: "标题", url: "链接" }
    // 新增文章时照格式加一行就行
    var articles = [
        {
            title: "笼中拳手与不飞编队的幽灵：资本主义政府的自主性、美联储的独立性与历史的失忆症",
            url: "logs/观澜/笼中拳手与不飞编队的幽灵.html"
        }
        var articles = [
        {
            title: "两周与被掏空的停火_失效的威胁松动的框架与不再听命的秩序队的幽灵",
            url: "logs/观澜/两周与被掏空的停火_失效的威胁松动的框架与不再听命的秩序.html"
        }
        // 将来加文章，在这里复制上面四行，改 title 和 url
    ];

    // 图片池：每张图片写 { src: "路径", caption: "一句话" }
    // 新增图片时照格式加一行就行
    var images = [
        {
            src: "images/cover.jpg",
            caption: ""
        }
        var images = [
        {
            src: "images/var images = [
        {
            src: "images/IMG_4101.jpeg",
            caption: ""
        }",
            caption: ""
        }
        // 将来加图片，在这里复制上面四行，改 src 和 caption
    ];

    // ── 第二步：抽牌 ──
    // 从数组里随机挑一个
    function pick(arr) {
        return arr[Math.floor(Math.random() * arr.length)];
    }

    // ── 第三步：挂上去 ──
    var article = pick(articles);
    var image   = pick(images);

    // 填文章
    var a = document.getElementById("article-spot");
    a.href = article.url;
    a.textContent = article.title;

    // 填图片
    var imgA = document.getElementById("image-spot");
    imgA.href = "images/";   // 点图片 → 进入图片板块
    var img = document.getElementById("image-spot-img");
    img.src = image.src;
    img.alt = image.caption;
    </script>
</body>
</html>
