<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tumanydays</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Serif SC", serif;
            background: #fafafa;
            color: #333;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            text-align: center;
            padding: 48px 32px;
            max-width: 520px;
        }
        .cover-img {
            max-width: 100%;
            border-radius: 8px;
            margin-bottom: 32px;
        }
        h1 {
            font-size: 2rem;
            font-weight: 400;
            letter-spacing: 4px;
            margin-bottom: 12px;
            color: #1a1a1a;
        }
        .tagline {
            font-size: 0.95rem;
            line-height: 1.8;
            color: #888;
            margin-bottom: 40px;
        }
        /* 两个入口 */
        .entries {
            display: flex;
            gap: 24px;
            justify-content: center;
        }
        .entry {
            display: block;
            text-decoration: none;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            padding: 24px 32px;
            color: #333;
            transition: border-color 0.2s, box-shadow 0.2s;
            min-width: 140px;
        }
        .entry:hover {
            border-color: #bbb;
            box-shadow: 0 2px 16px rgba(0,0,0,0.04);
        }
        .entry-icon {
            font-size: 1.6rem;
            margin-bottom: 8px;
        }
        .entry-title {
            font-size: 1rem;
            font-weight: 500;
            color: #1a1a1a;
            margin-bottom: 4px;
        }
        .entry-desc {
            font-size: 0.75rem;
            color: #aaa;
        }

        footer {
            margin-top: 48px;
            font-size: 0.8rem;
            color: #aaa;
        }
        @media (max-width: 400px) {
            .entries { flex-direction: column; gap: 12px; }
            .entry { min-width: auto; }
        }
    </style>
</head>
<body>
    <div class="card">
        <!-- 封面图 -->
        <img class="cover-img" src="images/cover.jpg" alt="封面">

        <h1>Tumanydays</h1>
        <p class="tagline">这里刚刚诞生。<br>就像一颗种子落在泥土里，<br>还没想好要长成什么样子。</p>

        <!-- 两个入口 -->
        <div class="entries">
            <a class="entry" href="logs/">
                <div class="entry-icon">📂</div>
                <div class="entry-title">日志</div>
                <div class="entry-desc">八个房间</div>
            </a>
            <a class="entry" href="images/">
                <div class="entry-icon">📷</div>
                <div class="entry-title">图片</div>
                <div class="entry-desc">光影碎片</div>
            </a>
        </div>

        <footer>— 始于 2026.5.28 —</footer>
    </div>
</body>
</html>
