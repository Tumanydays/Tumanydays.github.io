<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tumanydays</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #fafafa;
            color: #333;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            text-align: center;
            padding: 48px 32px;
            max-width: 480px;
        }
        h1 {
            font-size: 2rem;
            font-weight: 400;
            letter-spacing: 4px;
            margin-bottom: 16px;
            color: #1a1a1a;
        }
        p {
            font-size: 1rem;
            line-height: 1.8;
            color: #666;
        }
        .dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #333;
            border-radius: 50%;
            margin: 24px auto;
        }
        footer {
            margin-top: 32px;
            font-size: 0.8rem;
            color: #aaa;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Tumanydays</h1>
        <p>这里刚刚诞生。<br>就像一颗种子落在泥土里，<br>还没想好要长成什么样子。</p>
        <span class="dot"></span>
        <div class="posts">
            <p style="font-size:0.9rem;color:#999;margin-bottom:12px;">📂 日志</p>
            <a href="logs/" style="color:#333;text-decoration:none;line-height:2;">
                八个房间 — 公学 · 医海拾贝 · 字渡 · 月光 · 棱镜 · 浮光 · 知安 · 观澜
            </a>
        </div>
        <span class="dot"></span>
        <footer>— 始于 2026.5.28 —</footer>
    </div>
</body>
</html>
