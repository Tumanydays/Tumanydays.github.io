<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tumanydays</title>
    <link rel="icon" type="image/png" href="images/icon.png">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;600&amp;display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; }
        body {
            font-family: "Noto Serif SC", -apple-system, BlinkMacSystemFont, "Segoe UI", serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            padding: 40px 32px;
        }
        .message {
            font-size: 0.95rem;
            font-weight: 300;
            color: var(--text-faint);
            letter-spacing: 2px;
            line-height: 1.9;
        }
        #home-link {
            margin-top: 56px;
            opacity: 0;
            transition: opacity 2.5s ease;
        }
        #home-link.show { opacity: 1; }
        #home-link a {
            font-size: 0.9rem;
            color: var(--text-dim);
            text-decoration: none;
            letter-spacing: 3px;
            font-weight: 300;
        }
        #home-link a:hover { color: var(--hover); }

        @media (max-width: 600px) {
            .message { font-size: 0.88rem; }
            #home-link { margin-top: 48px; }
            .container { padding: 32px 24px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <p class="message">又是一个没有知识存在的荒原呵</p>
        <div id="home-link"><a href="index.html">Tumanydays</a></div>
    </div>

    <script>
        setTimeout(function() {
            document.getElementById('home-link').classList.add('show');
        }, 2500);
    </script>
</body>
</html>
