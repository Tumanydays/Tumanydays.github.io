<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate">
    <title>Tumanydays</title>
    <link rel="icon" type="image/png" href="images/icon.png">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;600&family=ZCOOL+XiaoWei&amp;display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; }
        body {
            font-family: "Noto Serif SC", -apple-system, BlinkMacSystemFont, "Segoe UI", serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .card {
            max-width: 400px;
            width: 100%;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 52px 36px 44px;
            background: var(--card-bg);
        }
        .message {
            font-size: 1.15rem;
            font-weight: 300;
            color: var(--text-faint);
            letter-spacing: 3px;
            line-height: 2;
            font-family: 'ZCOOL XiaoWei', serif;
            text-align: center;
        }
        .whisper {
            font-size: 0.95rem;
            color: var(--text-faint);
            font-weight: 300;
            letter-spacing: 2px;
            margin-top: 36px;
            font-family: 'ZCOOL XiaoWei', serif;
            text-align: center;
            line-height: 1.8;
        }
        #home-link {
            margin-top: 32px;
            text-align: right;
            opacity: 0;
            transition: opacity 2.5s ease;
        }
        #home-link.show { opacity: 1; }
        #home-link a {
            font-size: 0.9rem;
            color: var(--text-dim);
            text-decoration: none;
            letter-spacing: 3px;
            font-weight: 300;
        }
        #home-link a:hover { color: var(--hover); }

        @media (max-width: 600px) {
            .card { padding: 40px 24px 36px; }
            .message { font-size: 1rem; }
            .whisper { margin-top: 28px; font-size: 0.88rem; }
            #home-link { margin-top: 24px; }
        }
    </style>
</head>
<body>
    <div class="card">
        <p class="message">又是一个没有知识存在的荒原吗</p>
        <p class="whisper">迷失域里会有出路：</p>
        <div id="home-link"><a href="/">Tumanydays</a></div>
    </div>

    <script>
        // 迷失域中：所有版本均可点击退出回家
        if (sessionStorage.getItem('wander-mode') === 'true') {
            var note = sessionStorage.getItem('wander-note');
            var msg = document.querySelector('.message');
            var whs = document.querySelector('.whisper');
            var link = document.querySelector('#home-link');

            function exitWander() {
                sessionStorage.setItem('wander-mode', 'false');
                sessionStorage.removeItem('wander-note');
                sessionStorage.removeItem('wander-page');
                window.location.href = '/';
            }

            if (note) {
                msg.textContent = note;
                whs.textContent = '—— Tumanydays，刚刚';
            }
            // 无胡诌句时保留默认文本（又是一个没有知识存在的荒原吗 / 迷失域里会有出路：）
            msg.style.cursor = 'pointer';
            whs.style.cursor = 'pointer';
            link.style.display = 'none';
            msg.addEventListener('click', exitWander);
            whs.addEventListener('click', exitWander);
        }

        if (document.getElementById('home-link')) {
            setTimeout(function() {
                var el = document.getElementById('home-link');
                if (el) el.classList.add('show');
            }, 2500);
        }
    </script>
<script src="wander-mode.js"></script>
</body>
</html>
