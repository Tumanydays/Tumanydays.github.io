        <h1 class="essay-title">楚辞·九章·其三·哀郢（节选）</h1>
        <p class="essay-author">战国 · 屈原</p>
        <div class="essay-body">
            <p>皇天之不纯命兮，何百姓之震愆？民离散而相失兮，方仲春而东迁。去故乡而就远兮，遵江夏以流亡。出国门而轸怀兮，甲之晁吾以行。发郢都而去闾兮，怊荒忽其焉极？楫齐杨以容与兮，哀见君而不再得。望长楸而太息兮，涕淫淫其若霰。过夏首而西浮兮，顾龙门而不见。</p>
            <span class="section-break">· · ·</span>
            <p>曼余目以流观兮，冀壹反之何时？鸟飞反故乡兮，狐死必首丘。信非吾罪而弃逐兮，何日夜而忘之？</p>
