        <h1 class="essay-title">楚辞 · 招隐士</h1>
        <p class="essay-author">汉 · 淮南小山</p>
        <div class="essay-body">
            <p>桂树丛生兮山之幽，偃蹇连蜷兮枝相缭。山气巃嵸兮石嵯峨，溪谷崭岩兮水曾波。猿狖群啸兮虎豹嗥，攀援桂枝兮聊淹留。王孙游兮不归，春草生兮萋萋。岁暮兮不自聊，蟪蛄鸣兮啾啾。坱兮轧，山曲岪，心淹留兮恫慌忽。罔兮沕，憭兮栗，虎豹穴。丛薄深林兮人上栗。</p>
            <p>嵚岑碕礒兮碅磳磈硊，树轮相纠兮林木茷骫。青莎杂树兮薠草靃靡，白鹿麖麚兮或腾或倚。状貌崟崟兮峨峨，凄凄兮漇漇。猕猴兮熊罴，慕类兮以悲。攀援桂枝兮聊淹留，虎豹斗兮熊罴咆，禽兽骇兮亡其曹。王孙兮归来，山中兮不可以久留。</p>
