    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Noto Serif SC", "Songti SC", serif; background: var(--bg); color: var(--text); line-height: 1.9; }
        /* 背景几何动画 */
        #p5-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }
        .container {
            position: relative;
            z-index: 1;
        }

        .container { max-width: 680px; margin: 0 auto; padding: 64px 24px 80px; }
        .back { font-size: 0.85rem; color: var(--text-dim); text-decoration: none; margin-bottom: 16px; display: inline-block; }
        .back:hover { color: var(--hover); }
        h1 { font-size: 1.6rem; font-weight: 400; letter-spacing: 2px; margin-bottom: 4px; color: var(--text-title); }
        .subtitle { font-size: 0.85rem; color: var(--text-dim); margin-bottom: 48px; }
        .article-list { list-style: none; }
        .article-list li { border-bottom: 1px solid #eee; padding: 16px 0; }
        .article-list a { text-decoration: none; color: var(--text); font-size: 0.95rem; display: block; }
        .article-list a:hover { color: var(--hover); }
        .article-date { font-size: 0.75rem; color: var(--text-faint); margin-top: 2px; }
        footer { margin-top: 64px; padding-top: 24px; border-top: 1px solid var(--border); text-align: center; font-size: 0.8rem; color: var(--text-dim); }
        footer a { color: var(--text-dim); text-decoration: none; }
        footer a:hover { color: var(--hover); }
        @media (max-width: 500px) { .container { padding: 32px 16px 64px; } }
    </style>
</head>
<body>
<div id="p5-bg"></div>

    <script>
    var sketch = function(p) {
        var t, speed = 2e-5;
        var l = 80;
        var rads = [];
        p.setup = function() {
            var canvas = p.createCanvas(p.windowWidth, p.windowHeight);
            canvas.parent('p5-bg');
            p.colorMode(p.HSB, 1);
            p.strokeWeight(0.4);
            for (var i = 3; i < 11; i++) {
                rads[i] = l / (2 * p.tan(p.PI / i));
            }
        };
        p.draw = function() {
            t = speed * p.millis();
            p.background(250 / 255);
            p.push();
            p.translate(p.width / 2, p.height / 2);
            var s = p.min(p.width, p.height) / 500;
            p.scale(s);
            for (var i = 10; i > 2; i--) {
                var b = p.map(i, 3, 11, 0.72, 0.92);
                p.stroke(0, 0, b);
                poly(i);
            }
            for (var i = 3; i < 11; i++) {
                p.fill(0, 0, 0.35);
                dott(i, (11 - i) * t);
            }
            p.pop();
        };
        p.windowResized = function() {
            p.resizeCanvas(p.windowWidth, p.windowHeight);
        };
        function poly(N) {
            for (var i = 0; i < N; i++) {
                p.push();
                p.rotate(p.TWO_PI * i / N);
                p.line(-l / 2, rads[N], l / 2, rads[N]);
                p.pop();
            }
        }
        function dott(N, q) {
            q = (q + 0.5 / N) % 1;
            var qq = (q * N) % 1;
            var rot = Math.floor(q * N);
            p.push();
            p.rotate(p.TWO_PI * rot / N);
            p.noStroke();
            p.ellipse(p.lerp(l / 2, -l / 2, qq), rads[N], l * 0.1, l * 0.1);
            p.pop();
        }
    };
    new p5(sketch);
    </script>
