    <script>
    var sketch = function(p) {
        var t, speed = 2e-5;
        var l = 80;
        var rads = [];
        p.setup = function() {
            var canvas = p.createCanvas(p.windowWidth, p.windowHeight);
            canvas.parent('p5-bg');
            p.colorMode(p.HSB, 1);
            p.strokeWeight(0.4);
            for (var i = 3; i < 11; i++) {
                rads[i] = l / (2 * p.tan(p.PI / i));
            }
        };
        p.draw = function() {
            t = speed * p.millis();
            p.background(250 / 255);
            p.push();
            p.translate(p.width / 2, p.height / 2);
            var s = p.min(p.width, p.height) / 500;
            p.scale(s);
            for (var i = 10; i > 2; i--) {
                var b = p.map(i, 3, 11, 0.72, 0.92);
                p.stroke(0, 0, b);
                poly(i);
            }
            for (var i = 3; i < 11; i++) {
                p.fill(0, 0, 0.35);
                dott(i, (11 - i) * t);
            }
            p.pop();
        };
        p.windowResized = function() {
            p.resizeCanvas(p.windowWidth, p.windowHeight);
        };
        function poly(N) {
            for (var i = 0; i < N; i++) {
                p.push();
                p.rotate(p.TWO_PI * i / N);
                p.line(-l / 2, rads[N], l / 2, rads[N]);
                p.pop();
            }
        }
        function dott(N, q) {
            q = (q + 0.5 / N) % 1;
            var qq = (q * N) % 1;
            var rot = Math.floor(q * N);
            p.push();
            p.rotate(p.TWO_PI * rot / N);
            p.noStroke();
            p.ellipse(p.lerp(l / 2, -l / 2, qq), rads[N], l * 0.1, l * 0.1);
            p.pop();
        }
    };
    new p5(sketch);
    </script>

// Fisher-Yates 洗牌：每次刷新顺序不同
for (var i = articles.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = articles[i];
    articles[i] = articles[j];
    articles[j] = tmp;
}

// 渲染文章列表
var list = document.querySelector('.article-list');
articles.forEach(function(a) {
    var li = document.createElement('li');
    var link = document.createElement('a');
    link.href = a.file;
    link.textContent = a.title;
    li.appendChild(link);
    var date = document.createElement('div');
    date.className = 'article-date';
    date.textContent = a.author;
    li.appendChild(date);
    list.appendChild(li);
});
</script>
