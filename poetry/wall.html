<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>诗笺 · 环 — Tumanydays</title>
    <link rel="icon" type="image/png" href="../images/icon.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Serif SC", "Songti SC", serif;
            background: #fafafa;
            color: #333;
            overflow-x: hidden;
        }

        .back {
            position: fixed; top: 24px; left: 24px;
            font-size: 0.85rem; color: #999; text-decoration: none; z-index: 10;
        }
        .back:hover { color: #333; }

        /* ── 环形舞台：整个页面是一个大圆 ── */
        .stage {
            position: relative;
            width: 100vw; height: 100vh;
            display: flex;
            align-items: center; justify-content: center;
        }

        /* 中心提示 */
        .hint {
            position: absolute;
            font-size: 0.75rem; color: #ccc; letter-spacing: 2px;
            z-index: 5; text-align: center;
        }

        /* 每个词片 */
        .frag {
            position: absolute;
            text-decoration: none;
            color: #555;
            white-space: nowrap;
            letter-spacing: 1px;
            transition: color 0.3s, transform 0.3s;
            cursor: pointer;
        }
        .frag:hover {
            color: #1a1a1a;
            transform: scale(1.15);
        }

        /* 轻/重节奏 */
        .frag.w1 { font-size: 0.7rem; color: #bbb; font-weight: 300; }
        .frag.w2 { font-size: 0.85rem; color: #999; }
        .frag.w3 { font-size: 1.0rem; color: #666; }
        .frag.w4 { font-size: 1.15rem; color: #444; }
        .frag.w5 { font-size: 1.3rem; color: #333; }

        /* 响应式：小屏调小字号 */
        @media (max-width: 600px) {
            .frag.w1 { font-size: 0.6rem; }
            .frag.w2 { font-size: 0.7rem; }
            .frag.w3 { font-size: 0.8rem; }
            .frag.w4 { font-size: 0.9rem; }
            .frag.w5 { font-size: 1.0rem; }
        }
    </style>
</head>
<body>
    <a class="back" href="index.html">← 诗笺</a>

    <div class="stage" id="stage">
        <div class="hint">触碰任何一句</div>
    </div>

    <script src="poems.js"></script>
    <script>
    // ── 从诗词库自动生成环形碎片 ──
    // 每首诗取第一句作为墙上的词片
    var weights = ["w1","w2","w3","w4","w5","w3","w2","w4"];
    var fragments = [];

    poems.forEach(function(p, i) {
        // 取第一句，如果太长就截断
        var firstLine = p.lines[0].replace(/[，。、；：「」『』！？\s]/g, "");
        if (firstLine.length > 7) firstLine = firstLine.slice(0, 7);

        fragments.push({
            text: firstLine,
            link: "index.html#" + p.id,
            weight: weights[i % weights.length]
        });

        // 如果诗有 2 行以上，再加一句关键的
        if (p.lines.length >= 2 && firstLine.length > 2) {
            var keyLine = p.lines[p.lines.length - 1].replace(/[，。、；：「」『』！？\s]/g, "");
            if (keyLine.length > 7) keyLine = keyLine.slice(0, 7);
            if (keyLine.length > 2) {
                fragments.push({
                    text: keyLine,
                    link: "index.html#" + p.id,
                    weight: weights[(i + 3) % weights.length]
                });
            }
        }
    });

    // ── 把碎片排成环形 ──
    var stage = document.getElementById("stage");
    var cx = window.innerWidth / 2;
    var cy = window.innerHeight / 2;

    // 用 4 层同心圆，半径不同，每层分配碎片
    var rings = [90, 150, 210, 280];  // 小屏会自动缩小
    if (window.innerWidth < 600) {
        rings = [60, 105, 150, 200];
    }

    // 把碎片打散到各层
    var perRing = Math.ceil(fragments.length / rings.length);

    fragments.forEach(function(f, i) {
        var ringIdx = Math.floor(i / perRing);
        if (ringIdx >= rings.length) ringIdx = rings.length - 1;
        var r = rings[ringIdx];

        // 每层碎片均匀分布，但加一点随机偏移，避免太机械
        var countInRing = fragments.filter(function(_, j) {
            var ri = Math.floor(j / perRing);
            if (ri >= rings.length) ri = rings.length - 1;
            return ri === ringIdx;
        }).length;

        var baseAngle = (i % countInRing) / countInRing * Math.PI * 2;
        var jitter = (Math.random() - 0.5) * 0.2;  // 随机微偏
        var angle = baseAngle + jitter;

        // 内层稍微密集，外层稀疏
        var spread = r * (0.9 + Math.random() * 0.2);

        var x = cx + Math.cos(angle) * spread;
        var y = cy + Math.sin(angle) * spread;

        // 创建链接元素
        var a = document.createElement("a");
        a.className = "frag " + f.weight;
        a.href = f.link;
        a.textContent = f.text;
        a.style.left = x + "px";
        a.style.top  = y + "px";
        a.style.transform = "translate(-50%, -50%)";
        // 给一点微旋转，增加自然感
        a.style.transform += " rotate(" + ((Math.random()-0.5)*10) + "deg)";

        stage.appendChild(a);
    });

    // 窗口变化时重新居中
    window.addEventListener("resize", function() {
        location.reload();
    });
    </script>
</body>
</html>
