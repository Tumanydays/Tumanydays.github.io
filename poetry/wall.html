<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>诗笺 · 环 — Tumanydays</title>
    <link rel="icon" type="image/png" href="../images/icon.png">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Serif SC", "Songti SC", serif;
            background: radial-gradient(ellipse at center, #ffffff 0%, #f5f5f5 60%, #efefef 100%);
            color: var(--text);
            overflow: hidden;
            height: 100vh;
        }

        .back {
            position: fixed; top: 24px; left: 24px;
            font-size: 0.85rem; color: var(--text-dim); text-decoration: none; z-index: 10;
        }
        .back:hover { color: var(--hover); }

        /* ── 环形舞台：整个页面是一个大圆 ── */
        .stage {
            position: relative;
            width: 100vw; height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 每个词片 */
        .frag {
            position: absolute;
            text-decoration: none;
            color: var(--text-soft);
            font-family: "Noto Serif SC", "Songti SC", serif;
            white-space: nowrap;
            letter-spacing: inherit;
            transition: color 0.3s, transform 0.3s, opacity 0.3s;
            cursor: pointer;
        }
        .frag:hover {
            color: var(--text-title);
            transform: scale(1.25);
            opacity: 1 !important;
        }

        /* 轻/重节奏：五维渐变 ── 字重·透明度·字间距同步变化 */
        .frag.w1 { font-size: 0.7rem; color: var(--text-faint); font-weight: 300; opacity: 0.50; letter-spacing: 2.5px; }
        .frag.w2 { font-size: 0.85rem; color: var(--text-dim); font-weight: 400; opacity: 0.63; letter-spacing: 2px; }
        .frag.w3 { font-size: 1.0rem; color: var(--text-soft); font-weight: 400; opacity: 0.76; letter-spacing: 1.5px; }
        .frag.w4 { font-size: 1.15rem; color: var(--text); font-weight: 500; opacity: 0.88; letter-spacing: 1px; }
        .frag.w5 { font-size: 1.3rem; color: var(--text); font-weight: 600; opacity: 1.0;  letter-spacing: 0.3px; }

        /* 暖灰词片：潇潇暮雨洒江天 */
        .frag.special { color: #8a7e72; }

        /* 响应式：小屏调小字号 */
        @media (max-width: 600px) {
            .frag.w1 { font-size: 0.6rem; }
            .frag.w2 { font-size: 0.7rem; }
            .frag.w3 { font-size: 0.8rem; }
            .frag.w4 { font-size: 0.9rem; }
            .frag.w5 { font-size: 1.0rem; }
        }
    </style>
</head>
<body>
    <a class="back" href="index.html">← 诗笺</a>

    <div class="stage" id="stage">
    </div>

    <script src="poems.js"></script>
    <script>
    // ── 从诗词库自动生成环形碎片 ──
    // 按标点拆成自然词组，选短句上墙，不出现标点符号
    var weights = ["w1","w2","w3","w4","w5","w3","w2","w4"];
    var fragments = [];

    poems.forEach(function(p, i) {
        // 把整首诗的所有行拼在一起，按标点拆成词组
        var allText = p.lines.join("，");
        var phrases = allText.split(/[，。、；：！？\s]+/).filter(function(s) {
            return s.length >= 2 && s.length <= 8;
        });

        // 每首诗取 2-3 个词组上墙
        var picks = [];
        if (phrases.length >= 1) picks.push(phrases[0]);                      // 第一句
        if (phrases.length >= 2) picks.push(phrases[phrases.length - 1]);     // 最后一句
        if (phrases.length >= 4) picks.push(phrases[Math.floor(phrases.length / 2)]); // 中间一句

        picks.forEach(function(txt) {
            fragments.push({
                text: txt,
                link: "index.html#" + p.id,
                weight: weights[fragments.length % weights.length],
                special: p.id === "p1"
            });
        });
    });

    // ── 把碎片排成环形 ──
    var stage = document.getElementById("stage");
    var cx = window.innerWidth / 2;
    var cy = window.innerHeight / 2;

    // 用 4 层同心圆，半径不同，每层分配碎片
    var rings = [90, 150, 210, 280];  // 小屏会自动缩小
    if (window.innerWidth < 600) {
        rings = [60, 105, 150, 200];
    }

    // 把碎片打散到各层
    var perRing = Math.ceil(fragments.length / rings.length);

    // 存储词片数据用于浮动动画
    var floatData = [];

    fragments.forEach(function(f, i) {
        var ringIdx = Math.floor(i / perRing);
        if (ringIdx >= rings.length) ringIdx = rings.length - 1;
        var r = rings[ringIdx];

        // 每层碎片均匀分布，但加一点随机偏移，避免太机械
        var countInRing = fragments.filter(function(_, j) {
            var ri = Math.floor(j / perRing);
            if (ri >= rings.length) ri = rings.length - 1;
            return ri === ringIdx;
        }).length;

        var baseAngle = (i % countInRing) / countInRing * Math.PI * 2;
        var jitter = (Math.random() - 0.5) * 0.2;  // 随机微偏
        var angle = baseAngle + jitter;

        // 内层稍微密集，外层稀疏
        var spread = r * (0.9 + Math.random() * 0.2);

        var x = cx + Math.cos(angle) * spread;
        var y = cy + Math.sin(angle) * spread;

        // 创建链接元素
        var a = document.createElement("a");
        a.className = "frag " + f.weight + (f.special ? " special" : "");
        a.href = f.link;
        a.textContent = f.text;
        a.style.left = x + "px";
        a.style.top  = y + "px";
        a.style.transform = "translate(-50%, -50%)";
        // 给一点微旋转，增加自然感
        a.style.transform += " rotate(" + ((Math.random()-0.5)*10) + "deg)";

        stage.appendChild(a);
        // 收集浮动数据
        floatData.push({
            el: a,
            speed: 1.2 + Math.random() * 0.8,
            phase: Math.random() * Math.PI * 2,
            amp: 3
        });
    });

    // 正弦波浮动动画（比 CSS keyframes 更圆滑自然）
    function floatLoop(now) {
        if (!floatLoop.start) floatLoop.start = now;
        var t = (now - floatLoop.start) / 1000;
        floatData.forEach(function(fd) {
            var y = Math.sin(t * fd.speed + fd.phase) * fd.amp;
            fd.el.style.marginTop = y + 'px';
        });
        requestAnimationFrame(floatLoop);
    }
    requestAnimationFrame(floatLoop);

    // 窗口变化时重新居中
    window.addEventListener("resize", function() {
        location.reload();
    });
    </script>
</body>
</html>
