<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>诗笺 — Tumanydays</title>
    <link rel="icon" type="image/png" href="../images/icon.png">
    <link rel="stylesheet" href="../style.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Serif SC", "Songti SC", serif;
            background: var(--bg);
            color: var(--text);
            line-height: 2.2;
        }
        .container {
            max-width: 680px;
            margin: 0 auto;
            padding: 64px 32px 80px;
        }
        .back {
            font-size: 0.85rem;
            color: var(--text-dim);
            text-decoration: none;
            margin-bottom: 48px;
            display: inline-block;
        }
        .back:hover { color: var(--hover); }
        h1 {
            font-size: 1.4rem;
            font-weight: 400;
            letter-spacing: 2px;
            margin-bottom: 4px;
            color: var(--text-title);
        }
        .subtitle {
            font-size: 0.8rem;
            color: var(--text-faint);
            margin-bottom: 56px;
        }
        .subtitle a { color: var(--text-faint); text-decoration: none; }
        .subtitle a:hover { color: var(--hover); }

        /* ---------- 诗墙核心：连绵的意识流 ---------- */
        .poem {
            margin-bottom: 52px;  /* 诗与诗之间有空隙，但不隔断 */
            position: relative;
        }
        .poem:last-child { margin-bottom: 0; }

        /* 诗题：轻，不喧宾夺主 */
        .poem-title {
            font-size: 0.75rem;
            color: var(--text-faint);
            letter-spacing: 2px;
            margin-bottom: 14px;
            font-weight: 400;
        }

        /* 诗句本身：浅灰斜体，舒朗清瘦 */
        .poem-body {
            font-size: 0.95rem;
            color: var(--text-muted);
            line-height: 2.6;
            letter-spacing: 1px;
            font-style: italic;
        }

        /* 渐入效果：诗句逐行从下方滑入 */
        .poem-body p {
            opacity: 0;
            transform: translateY(5px);
            transition: opacity 1s ease, transform 1s ease;
        }
        .poem-body p.revealed {
            opacity: 1;
            transform: translateY(0);
        }

        /* 偶尔一行变轻 —— 让墙面有呼吸的节奏 */
        .poem-body .light {
            color: var(--text-dim);
        }

        /* 分隔用极细线，像毛笔提起来时的飞白 */
        .poem::after {
            content: "";
            display: block;
            width: 24px;
            height: 1px;
            background: #ddd;
            margin-top: 52px;
        }
        .poem:last-child::after { display: none; }

        /* 统一节奏：浅灰斜体，不忽大忽小 */

        /* 暖灰标记：对潇潇暮雨洒江天 */
        #p1 .poem-title { color: #8a7e72; }
        #p1 .poem-body p { color: #8a7e72; }

        footer {
            margin-top: 72px;
            padding-top: 24px;
            border-top: 1px solid #eee;
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-dim);
        }
        footer a { color: var(--text-dim); text-decoration: none; }
        footer a:hover { color: var(--hover); }

        @media (max-width: 500px) {
            .container { padding: 32px 20px 64px; }
            .poem-body { font-size: 0.95rem; line-height: 2.2; }
            .poem { margin-bottom: 40px; }
            .poem::after { margin-top: 40px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <a class="back" href="../index.html">← Tumanydays</a>
        <h1>诗笺</h1>
        <p class="subtitle">曾照彩云归 &nbsp;·&nbsp; <a href="wall.html">环</a> &nbsp;·&nbsp; <a href="文/">文</a></p>

        <!-- ═══════ 诗墙（由 JS 从 poems.js 自动渲染）═══════ -->
        <div id="poem-wall"></div>

        <footer>
            <a href="../index.html">← 返回首页</a>
        </footer>
    </div>

    <script src="poems.js"></script>
    <script>
    // 从诗词库渲染每一首诗（打乱顺序，每次刷新排列不同）
    var wall = document.getElementById("poem-wall");

    // Fisher-Yates 洗牌
    var shuffled = poems.slice();
    for (var i = shuffled.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var tmp = shuffled[i];
        shuffled[i] = shuffled[j];
        shuffled[j] = tmp;
    }

    shuffled.forEach(function(p) {
        var div = document.createElement("div");
        div.className = "poem";
        div.id = p.id;

        var title = document.createElement("div");
        title.className = "poem-title";
        title.textContent = p.author + " · " + p.title;
        div.appendChild(title);

        var body = document.createElement("div");
        body.className = "poem-body";

        p.lines.forEach(function(line, i) {
            var para = document.createElement("p");
            para.textContent = line;
            para.style.transitionDelay = (i * 0.12) + "s";
            body.appendChild(para);
        });

        div.appendChild(body);
        wall.appendChild(div);
    });

    // 渐入观察器：诗句进入视口时逐行浮现
    var observer = new IntersectionObserver(function(entries) {
        entries.forEach(function(entry) {
            if (entry.isIntersecting) {
                var lines = entry.target.querySelectorAll('.poem-body p');
                lines.forEach(function(p) { p.classList.add('revealed'); });
                observer.unobserve(entry.target);
            }
        });
    }, { threshold: 0.15 });
    document.querySelectorAll('.poem').forEach(function(p) { observer.observe(p); });
    </script>
</body>
</html>
