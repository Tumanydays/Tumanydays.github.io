<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>摘 — Tumanydays</title>
    <link rel="icon" type="image/png" href="../../images/icon.png">
    <link rel="stylesheet" href="../../style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;600&amp;display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Noto Serif SC", -apple-system, BlinkMacSystemFont, "Segoe UI", "Songti SC", serif;
            background: var(--bg);
            color: var(--text);
            line-height: 2.2;
        }
        .container {
            max-width: 680px;
            margin: 0 auto;
            padding: 64px 32px 80px;
        }
        .back {
            font-size: 0.85rem;
            color: var(--text-dim);
            text-decoration: none;
            margin-bottom: 48px;
            display: inline-block;
        }
        .back:hover { color: var(--hover); }
        h1 {
            font-size: 1.4rem;
            font-weight: 400;
            letter-spacing: 2px;
            margin-bottom: 4px;
            color: var(--text-title);
        }
        .subtitle {
            font-size: 0.8rem;
            color: var(--text-faint);
            margin-bottom: 56px;
            text-align: right;
        }

        /* ── 摘句分组 ── */
        .snippet-group {
            margin-bottom: 52px;
            text-align: right;
        }

        /* 组标题：作者 · 词牌，轻、小、一致 */
        .snippet-group-title {
            font-size: 0.75rem;
            color: var(--text-faint);
            letter-spacing: 2px;
            font-weight: 300;
            text-align: right;
            margin-bottom: 8px;
        }

        /* 诗句本身 */
        .snippet-text {
            font-size: 0.85rem;
            color: var(--text-dim);
            line-height: 2.4;
            letter-spacing: 2px;
            font-family: 'Noto Serif SC', serif;
            font-weight: 300;
            text-align: right;
            text-decoration: none;
            display: block;
            opacity: 0;
            transform: translateY(5px);
            transition: opacity 1s ease var(--reveal-delay, 0s),
                        transform 0.3s ease 0s,
                        color 0.3s ease 0s;
        }
        .snippet-text.revealed {
            opacity: 1;
            transform: translateY(0);
        }

        /* 桌面 hover */
        @media (hover: hover) {
            .snippet-text:hover {
                color: var(--ink);
                transform: translateY(0) scale(1.08);
            }
        }

        /* 移动端 touch：整组浸染 */
        .snippet-group.ink-active .snippet-text {
            color: var(--ink) !important;
            font-size: 1rem;
        }

        /* 分隔线：与诗墙一致 */
        .snippet-group::after {
            content: "";
            display: block;
            width: 24px;
            height: 1px;
            background: #ddd;
            margin: 52px auto 0;
        }
        .snippet-group:last-child::after { display: none; }

        footer {
            margin-top: 72px;
            padding-top: 24px;
            border-top: 1px solid #eee;
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-dim);
        }
        footer a { color: var(--text-dim); text-decoration: none; }
        footer a:hover { color: var(--hover); }

        @media (max-width: 500px) {
            .container { padding: 32px 20px 64px; }
            .snippet-text { font-size: 0.95rem; line-height: 2.2; }
            .snippet-group.ink-active .snippet-text { font-size: 1rem; }
            .snippet-group { margin-bottom: 40px; }
            .snippet-group::after { margin-top: 40px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <a class="back" href="../index.html">← 诗笺</a>
        <h1>摘</h1>
        <p class="subtitle">拾句</p>

        <!-- ═══════ 摘句墙（从 poems.js 的 verse/verses 字段自动收集，按诗分组）═══════ -->
        <div id="snippet-wall"></div>

        <footer>
            <a href="../index.html">← 返回诗笺</a>
            &nbsp;·&nbsp;
            <a href="../../index.html">← 返回首页</a>
        </footer>
    </div>

    <script src="../poems.js"></script>
    <script>
    // 从诗词库中按诗分组收集摘句
    var groups = [];
    poems.forEach(function(p) {
        var lines = [];
        if (p.verse) lines.push(p.verse);
        if (p.verses) lines = lines.concat(p.verses);
        if (lines.length > 0) {
            groups.push({
                id: p.id,
                author: p.author,
                title: p.title,
                lines: lines
            });
        }
    });

    // 渲染——以诗为单位分组展示
    var wall = document.getElementById("snippet-wall");
    var globalIdx = 0;

    groups.forEach(function(g) {
        var groupDiv = document.createElement("div");
        groupDiv.className = "snippet-group";

        // 组标题：作者 · 词牌
        var title = document.createElement("div");
        title.className = "snippet-group-title";
        title.textContent = g.author + " · " + g.title;
        groupDiv.appendChild(title);

        // 组内每一句摘录
        g.lines.forEach(function(line) {
            var link = document.createElement("a");
            link.className = "snippet-text";
            link.href = "../index.html#" + g.id;
            link.textContent = line;
            link.style.setProperty('--reveal-delay', (globalIdx * 0.12) + 's');
            globalIdx++;
            groupDiv.appendChild(link);
        });

        wall.appendChild(groupDiv);
    });

    // 渐入观察器：整组进入视口时浮现
    var observer = new IntersectionObserver(function(entries) {
        entries.forEach(function(entry) {
            if (entry.isIntersecting) {
                var lines = entry.target.querySelectorAll('.snippet-text');
                lines.forEach(function(p) { p.classList.add('revealed'); });
                observer.unobserve(entry.target);
            }
        });
    }, { threshold: 0.15 });
    document.querySelectorAll('.snippet-group').forEach(function(g) { observer.observe(g); });

    // 移动端 touch：轻触整组浸染蓝墨水色
    if ('ontouchstart' in window || navigator.maxTouchPoints > 0) {
        document.querySelectorAll('.snippet-group').forEach(function(g) {
            g.addEventListener('click', function(e) {
                if (e.target.closest('.snippet-text')) return;
                document.querySelectorAll('.snippet-group.ink-active').forEach(function(s) {
                    if (s !== this) s.classList.remove('ink-active');
                }, this);
                this.classList.toggle('ink-active');
            });
        });
        document.addEventListener('click', function(e) {
            if (!e.target.closest('.snippet-group')) {
                document.querySelectorAll('.snippet-group.ink-active').forEach(function(s) {
                    s.classList.remove('ink-active');
                });
            }
        });
    }
    </script>
<script src="../../wander-mode.js"></script>
</body>
</html>
