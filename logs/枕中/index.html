<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>枕中 — Tumanydays</title>
    <link rel="icon" type="image/png" href="../../images/icon.png">
    <link rel="stylesheet" href="../../style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;600&amp;display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Noto Serif SC", -apple-system, BlinkMacSystemFont, "Segoe UI", serif; background: #f8f5ef; color: var(--text); line-height: 1.9; }
        .container { max-width: 680px; margin: 0 auto; padding: 80px 24px; }
        h1 { font-size: 1.4rem; font-weight: 400; letter-spacing: 4px; margin-bottom: 4px; color: var(--text-title); }
        .subtitle { font-size: 0.82rem; color: var(--text-dim); margin-bottom: 56px; }
        .series-list { list-style: none; }
        .series-list li { border-bottom: 1px solid #eee; padding: 18px 0; }
        .series-list a { text-decoration: none; display: block; }
        .series-list a:hover .entry-title { color: var(--hover); }
        .entry-title { font-size: 0.95rem; color: var(--text); margin-bottom: 2px; }
        .entry-desc { font-size: 0.8rem; color: var(--text-dim); line-height: 1.5; }

        /* ── 门框上的字 ── */
        .inscription {
            text-align: center;
            color: var(--text-faint);
            font-size: 0.72rem;
            font-weight: 300;
            margin-top: 10px;
            letter-spacing: 3px;
        }

        /* ── 一盏不灭的灯 ── */
        .lamp {
            position: fixed;
            bottom: 36px;
            left: 28px;
            z-index: 1;
            pointer-events: none;
        }
        .lamp-shade {
            width: 22px;
            height: 11px;
            background: #d4c5a0;
            border-radius: 11px 11px 0 0;
            margin: 0 auto;
            opacity: 0.6;
        }
        .lamp-glow {
            width: 36px;
            height: 36px;
            background: radial-gradient(circle, rgba(212,197,160,0.18) 0%, rgba(212,197,160,0.06) 50%, transparent 70%);
            border-radius: 50%;
            margin: -28px auto 0;
        }
        .lamp-stem {
            width: 1px;
            height: 24px;
            background: #d4c5a0;
            margin: -2px auto 0;
            opacity: 0.5;
        }
        .lamp-base {
            width: 14px;
            height: 2px;
            background: #d4c5a0;
            margin: 0 auto;
            border-radius: 1px;
            opacity: 0.5;
        }

        @media (max-width: 500px) {
            .container { padding: 48px 20px 64px; }
            .lamp { bottom: 24px; left: 20px; }
            .lamp-shade { width: 18px; height: 9px; }
            .lamp-glow { width: 28px; height: 28px; margin-top: -22px; }
            .lamp-stem { height: 18px; }
        }
    </style>
</head>
<body>

    <div class="lamp">
        <div class="lamp-shade"></div>
        <div class="lamp-glow"></div>
        <div class="lamp-stem"></div>
        <div class="lamp-base"></div>
    </div>

    <div class="container">
        <h1>枕中</h1>
        <p class="subtitle">—— 枕中人，不知梦也</p>
        <p class="inscription">此处是吾乡</p>
        <ul class="series-list">
            <li>
                <a href="公学/">
                    <div class="entry-title">公学 · 关于实践的所有奋斗</div>
                </a>
            </li>
        </ul>
    </div>

<canvas id="rain-canvas"></canvas>

<script>
    // ═══ 窗外下雨 ═══
    (function() {
        var c = document.getElementById('rain-canvas');
        if (!c) return;
        var ctx = c.getContext('2d');
        var drops = [];
        function resize() {
            c.style.cssText = 'position:fixed;top:0;right:0;width:40%;height:100%;z-index:0;pointer-events:none;';
            c.width = window.innerWidth * 0.4;
            c.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);
        for (var i = 0; i < 60; i++) {
            drops.push({
                x: Math.random() * c.width,
                y: Math.random() * c.height,
                len: 8 + Math.random() * 14,
                speed: 3 + Math.random() * 4,
                opacity: 0.08 + Math.random() * 0.12
            });
        }
        function draw() {
            ctx.clearRect(0, 0, c.width, c.height);
            ctx.strokeStyle = 'rgba(160,160,160,';
            ctx.lineWidth = 0.5;
            for (var i = 0; i < drops.length; i++) {
                var d = drops[i];
                ctx.globalAlpha = d.opacity;
                ctx.beginPath();
                ctx.moveTo(d.x, d.y);
                ctx.lineTo(d.x - 1, d.y + d.len);
                ctx.stroke();
                d.y += d.speed;
                if (d.y > c.height) { d.y = -d.len; d.x = Math.random() * c.width; }
            }
            requestAnimationFrame(draw);
        }
        draw();
    })();

    // ═══ 灯：点击后打哈欠 ═══
    (function() {
        var lamp = document.querySelector('.lamp');
        if (!lamp) return;
        lamp.style.cursor = 'pointer';
        lamp.style.pointerEvents = 'auto';

        lamp.addEventListener('click', function() {
            // zzz 浮现
            for (var zi = 0; zi < 3; zi++) {
                (function(idx) {
                    setTimeout(function() {
                        var z = document.createElement('div');
                        z.textContent = 'z';
                        var size = 0.7 + idx * 0.2;
                        var top = 36 + idx * 20;
                        var right = 28 + idx * 12;
                        z.style.cssText = 'position:fixed;top:' + top + 'px;right:' + right + 'px;font-size:' + size + 'rem;color:#bbb;font-weight:300;z-index:2;pointer-events:none;opacity:0;transition:opacity 0.6s ease,transform 0.6s ease;transform:translateY(8px);';
                        document.body.appendChild(z);
                        requestAnimationFrame(function() { z.style.opacity = '0.5'; z.style.transform = 'translateY(0)'; });
                        setTimeout(function() {
                            z.style.opacity = '0';
                            setTimeout(function() { if (z.parentNode) z.parentNode.removeChild(z); }, 600);
                        }, 1800);
                    }, idx * 400);
                })(zi);
            }
        });
    })();
</script>
<script src="../../wander-mode.js"></script>
</body>
</html>
