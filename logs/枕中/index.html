<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>枕中 — Tumanydays</title>
    <link rel="icon" type="image/png" href="../../images/icon.png">
    <link rel="stylesheet" href="../../style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;600&family=ZCOOL+XiaoWei&amp;display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Noto Serif SC", -apple-system, BlinkMacSystemFont, "Segoe UI", serif; background: #f5f0e8; color: var(--text); line-height: 1.9; }
        .container { max-width: 680px; margin: 0 auto; padding: 80px 24px; }
        h1 { font-size: 1.4rem; font-weight: 400; letter-spacing: 4px; margin-bottom: 4px; color: var(--text-title); }
        .subtitle { font-size: 0.82rem; color: var(--text-dim); margin-bottom: 56px; }
        .series-list { list-style: none; }
        .series-list li { border-bottom: 1px solid #ddd; padding: 18px 0; }
        .series-list a { text-decoration: none; display: block; }
        .series-list a:hover .entry-title { color: var(--hover); }
        .entry-title { font-size: 0.95rem; color: var(--text); margin-bottom: 2px; }
        .entry-desc { font-size: 0.8rem; color: var(--text-dim); line-height: 1.5; }
        .door-entry { font-family: 'ZCOOL XiaoWei', serif; font-weight: 400; font-size: 1rem; letter-spacing: 2px; }

        /* ── 门框上的字 ── */
        .inscription {
            text-align: center;
            color: var(--text-faint);
            font-size: 0.72rem;
            font-weight: 300;
            margin-top: 10px;
            letter-spacing: 3px;
        }

        /* ── 一盏黄铜台灯 ── */
        .lamp {
            position: fixed;
            bottom: 36px;
            left: 28px;
            z-index: 1;
            pointer-events: none;
        }
        .lamp-arm {
            width: 2px; height: 26px;
            background: #b8a88a; opacity: 0.55;
            margin: 0 auto; border-radius: 1px;
        }
        .lamp-joint {
            width: 10px; height: 3px;
            background: #b8a88a; opacity: 0.45;
            margin: -1px auto 0; border-radius: 2px;
        }
        .lamp-shade {
            width: 40px; height: 0;
            border-bottom: 18px solid #b8a88a;
            border-left: 6px solid transparent;
            border-right: 6px solid transparent;
            opacity: 0.45;
            margin: 0 auto; position: relative;
        }
        .lamp-glow {
            width: 44px; height: 28px;
            background: radial-gradient(ellipse, rgba(184,168,138,0.13) 0%, rgba(184,168,138,0.04) 60%, transparent 80%);
            border-radius: 50%;
            margin: -20px auto 0;
        }
        .lamp-pool {
            width: 52px; height: 16px;
            background: radial-gradient(ellipse, rgba(184,168,138,0.08) 0%, transparent 70%);
            margin: -8px auto 0;
            transition: opacity 0.6s ease;
        }
        .lamp-base {
            width: 28px; height: 4px;
            background: #b8a88a; opacity: 0.4;
            margin: 4px auto 0; border-radius: 2px;
        }

        @media (max-width: 500px) {
            .container { padding: 48px 20px 64px; }
            .lamp { bottom: 24px; left: 20px; }
            .lamp-shade { width: 32px; border-bottom-width: 14px; border-left-width: 4px; border-right-width: 4px; }
            .lamp-glow { width: 36px; height: 22px; margin-top: -16px; }
            .lamp-pool { width: 40px; }
            .lamp-arm { height: 20px; }
        }
        }
    </style>
</head>
<body>

    <div class="lamp">
        <div class="lamp-arm"></div>
        <div class="lamp-joint"></div>
        <div class="lamp-shade"></div>
        <div class="lamp-glow"></div>
        <div class="lamp-pool"></div>
        <div class="lamp-base"></div>
    </div>

    <div class="container">
        <h1>枕中</h1>
        <p class="subtitle">—— 枕中人，不知梦也</p>
        <p class="inscription">夜坐听风</p>
        <ul class="series-list">
            <li>
                <a href="公学/">
                    <div class="entry-title door-entry">一扇通往书桌的门</div>
                </a>
            </li>
        </ul>
    </div>

<canvas id="rain-canvas"></canvas>

<script>
    // ═══ 窗外下雨（深色雨 + 地面溅落） ═══
    (function() {
        var c = document.getElementById('rain-canvas');
        if (!c) return;
        var ctx = c.getContext('2d');
        var drops = [];
        var splashes = [];
        var groundY = 0;
        function resize() {
            c.style.cssText = 'position:fixed;top:0;right:0;width:40%;height:100%;z-index:0;pointer-events:none;';
            c.width = window.innerWidth * 0.4;
            c.height = window.innerHeight;
            groundY = c.height - 16;
        }
        resize();
        window.addEventListener('resize', resize);
        for (var i = 0; i < 50; i++) {
            drops.push({
                x: Math.random() * c.width,
                y: Math.random() * c.height,
                len: 10 + Math.random() * 16,
                speed: 4 + Math.random() * 4,
                opacity: 0.18 + Math.random() * 0.18
            });
        }
        function draw() {
            ctx.clearRect(0, 0, c.width, c.height);
            // 地面
            ctx.globalAlpha = 0.15;
            ctx.strokeStyle = 'rgba(180,180,180,1)';
            ctx.lineWidth = 0.5;
            ctx.beginPath();
            ctx.moveTo(0, groundY);
            ctx.lineTo(c.width, groundY);
            ctx.stroke();
            // 雨
            ctx.strokeStyle = 'rgba(120,120,120,1)';
            ctx.lineWidth = 0.6;
            for (var i = 0; i < drops.length; i++) {
                var d = drops[i];
                ctx.globalAlpha = d.opacity;
                ctx.beginPath();
                ctx.moveTo(d.x, d.y);
                ctx.lineTo(d.x - 0.5, d.y + d.len);
                ctx.stroke();
                d.y += d.speed;
                if (d.y > groundY) {
                    // 溅落
                    splashes.push({ x: d.x, y: groundY - 2, life: 1 });
                    d.y = -d.len;
                    d.x = Math.random() * c.width;
                }
            }
            // 溅落
            ctx.strokeStyle = 'rgba(120,120,120,1)';
            ctx.lineWidth = 0.5;
            for (var i = splashes.length - 1; i >= 0; i--) {
                var s = splashes[i];
                ctx.globalAlpha = s.life * 0.3;
                var spread = (1 - s.life) * 10;
                ctx.beginPath();
                ctx.moveTo(s.x - spread, s.y);
                ctx.lineTo(s.x + spread, s.y);
                ctx.stroke();
                s.life -= 0.035;
                if (s.life <= 0) splashes.splice(i, 1);
            }
            requestAnimationFrame(draw);
        }
        draw();
    })();

    // ═══ 灯：点击开关灯，zzz 循环浮动 ═══
    (function() {
        var lamp = document.querySelector('.lamp');
        if (!lamp) return;
        lamp.style.cursor = 'pointer';
        lamp.style.pointerEvents = 'auto';
        var sleeping = false;
        var spawnTimer = null;

        var insc = document.querySelector('.inscription');

        function spawnZZZ() {
            for (var zi = 0; zi < 3; zi++) {
                (function(idx) {
                    setTimeout(function() {
                        var z = document.createElement('div');
                        z.textContent = 'z';
                        var size = 0.85 + idx * 0.22;
                        var zBottom = 90 + idx * 18;
                        var zLeft = 68 + idx * 18;
                        var phase = Math.random() * 6.28;
                        z.style.cssText = 'position:fixed;bottom:' + zBottom + 'px;left:' + zLeft + 'px;font-size:' + size + 'rem;color:#ccc;font-weight:300;z-index:2;pointer-events:none;opacity:0;transition:opacity 0.5s ease;';
                        document.body.appendChild(z);
                        requestAnimationFrame(function() { z.style.opacity = '0.5'; });

                        var baseY = zBottom;
                        var t = 0;
                        var timer = setInterval(function() {
                            if (!sleeping) { clearInterval(timer); return; }
                            t += 0.05;
                            var floatY = Math.sin(t * 1.5 + phase) * 3;
                            z.style.bottom = (baseY + floatY) + 'px';
                        }, 30);

                        setTimeout(function() {
                            z.style.opacity = '0';
                            setTimeout(function() {
                                clearInterval(timer);
                                if (z.parentNode) z.parentNode.removeChild(z);
                            }, 500);
                        }, 2500);
                    }, idx * 380);
                })(zi);
            }
        }

        lamp.addEventListener('click', function() {
            sleeping = !sleeping;
            if (sleeping) {
                if (insc) insc.textContent = '昼眠听雨';
                spawnZZZ();
                spawnTimer = setInterval(spawnZZZ, 3200);
            } else {
                if (insc) insc.textContent = '夜坐听风';
                if (spawnTimer) { clearInterval(spawnTimer); spawnTimer = null; }
            }
        });
    })();
</script>
<script src="../../wander-mode.js"></script>
</body>
</html>
