<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>枕中 — Tumanydays</title>
    <link rel="icon" type="image/png" href="../../images/icon.png">
    <link rel="stylesheet" href="../../style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;600&family=ZCOOL+XiaoWei&amp;display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/0.7.2/p5.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'ZCOOL XiaoWei', "Noto Serif SC", serif; background: #f5f0e8; color: var(--text); line-height: 1.9; }
        .container { max-width: 680px; margin: 0 auto; padding: 80px 24px; }
        h1 { font-size: 1.4rem; font-weight: 400; letter-spacing: 4px; margin-bottom: 4px; color: var(--text-title); }
        .subtitle { font-size: 0.82rem; color: var(--text-dim); margin-bottom: 56px; }
        .series-list { list-style: none; }
        .series-list li { border-bottom: 1px solid #ddd; padding: 18px 0; }
        .series-list a { text-decoration: none; display: block; }
        .series-list a:hover .entry-title { color: var(--hover); }
        .entry-title { font-size: 0.95rem; color: var(--text); margin-bottom: 2px; }
        .entry-desc { font-size: 0.8rem; color: var(--text-dim); line-height: 1.5; }

        /* ── 门框上的字 ── */
        .inscription {
            text-align: center;
            color: var(--text-faint);
            font-size: 0.72rem;
            font-weight: 300;
            margin-top: 10px;
            letter-spacing: 3px;
        }

        /* ── 光源覆盖 ── */
        .lighting {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* ── 斗笠吊灯 ── */
        .lamp {
            position: fixed;
            top: 210px;
            left: calc(50% - 105px);
            z-index: 1;
            pointer-events: none;
        .lamp-cord {
            width: 1px; height: 14px;
            background: #c8bca8; opacity: 0.3;
            margin: 0 auto;
        }
        .lamp-tip {
            width: 4px; height: 3px;
            background: rgba(200,188,168,0.3);
            margin: 0 auto; border-radius: 1px;
        }
        .lamp-hat {
            width: 38px; height: 0;
            border-bottom: 18px solid rgba(200,188,168,0.2);
            border-left: 4px solid transparent;
            border-right: 4px solid transparent;
            margin: 0 auto;
        }
        /* ── 灯下光线 ── */
        .lamp-rays {
            position: absolute;
            top: 55px;
            left: -16px;
            width: 70px;
            height: 18px;
            pointer-events: none;
        }
        .lamp-rays i {
            position: absolute;
            width: 1px;
            background: rgba(200,188,168,0.2);
            border-radius: 1px;
            top: 0;
            transition: opacity 0.5s ease;
        }
        .lamp-rays.hidden i { opacity: 0; }
        .lamp-rays i:nth-child(1) {
            left: 8px;
            height: 16px;
            transform: rotate(16deg);
            transform-origin: top center;
        }
        .lamp-rays i:nth-child(2) {
            left: 50%;
            height: 18px;
            margin-left: -0.5px;
        }
        .lamp-rays i:nth-child(3) {
            right: 8px;
            height: 16px;
            transform: rotate(-16deg);
            transform-origin: top center;
        }

        /* ── 胡诌句容器 ── */
        #nonsense {
            position: fixed !important;
            right: calc(3% + 80px) !important;
            bottom: 10% !important;
            left: auto !important;
            top: auto !important;
            z-index: 5;
            width: 320px;
            height: 200px;
            overflow: visible;
            pointer-events: none;
        }
        #nonsense.hidden { display: none; }
        .nonsense-item {
            position: absolute;
            right: 0;
            bottom: 0;
            font-family: 'ZCOOL XiaoWei', serif;
            font-size: 0.85rem;
            color: var(--text-muted);
            text-align: right;
            line-height: 2;
            white-space: nowrap;
            opacity: 0.9; /* JS 驱动动画，CSS 仅定义初始态 */
        }

        @media (max-width: 700px) {
            .lamp { left: calc(50% - 60px); }
        }
    </style>
</head>
<body>

    <div class="lighting"></div>

    <div class="lamp">
        <div class="lamp-cord"></div>
        <div class="lamp-tip"></div>
        <div class="lamp-hat"></div>
        <div class="lamp-rays">
            <i></i>
            <i></i>
            <i></i>
        </div>
    </div>

    <div class="nonsense hidden" id="nonsense" style="position:fixed;right:calc(3% + 80px);bottom:10%;left:auto;top:auto;"></div>

    <div class="container">
        <h1>枕中</h1>
        <p class="subtitle">—— 枕中人，不知梦也</p>
        <p class="inscription">夜坐听风</p>
        <ul class="series-list">
            <li>
                <a href="公学/">
                    <div class="entry-title">一扇通往书桌的门</div>
                </a>
            </li>
        </ul>
    </div>

<canvas id="rain-canvas"></canvas>

<script>
    // ═══ 灯位校准：定位到天花板横线左三分之一处 ═══
    (function() {
        var lamp = document.querySelector('.lamp');
        var list = document.querySelector('.series-list');
        var light = document.querySelector('.lighting');
        if (!lamp || !list) return;
        function positionLamp() {
            var rect = list.getBoundingClientRect();
            var lineY = rect.top + rect.height;
            var cont = list.closest('.container');
            var contRect = cont ? cont.getBoundingClientRect() : { left: 0 };
            var thirdX = contRect.left + (rect.width / 3);
            lamp.style.top = (lineY - 2) + 'px';
            lamp.style.left = (thirdX) + 'px';
            if (light) {
                light.style.background = 'radial-gradient(ellipse 80% 70% at ' + thirdX + 'px ' + (lineY + 20) + 'px, transparent 0%, transparent 40%, rgba(0,0,0,0.015) 60%, rgba(0,0,0,0.03) 80%, rgba(0,0,0,0.05) 100%)';
            }
        }
        positionLamp();

    })();

    var raining = true;

    // ═══ 窗外下雨（深色雨 + 地面溅落） ═══
    (function() {
        var c = document.getElementById('rain-canvas');
        if (!c) return;
        var ctx = c.getContext('2d');
        var drops = [];
        var splashes = [];
        var groundY = 0;
        function resize() {
            c.style.cssText = 'position:fixed;top:0;right:0;width:40%;height:100%;z-index:0;pointer-events:none;';
            c.width = window.innerWidth * 0.4;
            c.height = window.innerHeight;
            groundY = c.height - 16;
        }
        resize();
        window.addEventListener('resize', resize);
        for (var i = 0; i < 50; i++) {
            drops.push({
                x: Math.random() * c.width,
                y: Math.random() * c.height,
                len: 10 + Math.random() * 16,
                speed: 4 + Math.random() * 4,
                opacity: 0.18 + Math.random() * 0.18
            });
        }
        window.resetDrops = function() {
            for (var i = 0; i < drops.length; i++) {
                drops[i].y = Math.random() * -c.height;
                drops[i].x = Math.random() * c.width;
            }
        }

        function draw() {
            ctx.clearRect(0, 0, c.width, c.height);
            // 地面
            ctx.globalAlpha = 0.15;
            ctx.strokeStyle = 'rgba(180,180,180,1)';
            ctx.lineWidth = 0.5;
            ctx.beginPath();
            ctx.moveTo(0, groundY);
            ctx.lineTo(c.width, groundY);
            ctx.stroke();
            // 雨滴
            var alive = false;
            ctx.strokeStyle = 'rgba(120,120,120,1)';
            ctx.lineWidth = 0.6;
            for (var i = 0; i < drops.length; i++) {
                var d = drops[i];
                if (d.y < groundY) {
                    ctx.globalAlpha = d.opacity;
                    ctx.beginPath();
                    ctx.moveTo(d.x, d.y);
                    ctx.lineTo(d.x - 0.5, d.y + d.len);
                    ctx.stroke();
                    d.y += d.speed;
                    if (d.y < groundY) alive = true;
                }
                if (d.y >= groundY && raining) {
                    // 下雨时：溅落 + 重置到顶部
                    splashes.push({ x: d.x, y: groundY - 2, life: 1 });
                    d.y = -d.len;
                    d.x = Math.random() * c.width;
                    alive = true;
                }
                // 停雨时：雨滴落到地面后自然消失，不重置
            }
            // 溅落
            ctx.strokeStyle = 'rgba(120,120,120,1)';
            ctx.lineWidth = 0.5;
            for (var i = splashes.length - 1; i >= 0; i--) {
                var s = splashes[i];
                ctx.globalAlpha = s.life * 0.3;
                var spread = (1 - s.life) * 10;
                ctx.beginPath();
                ctx.moveTo(s.x - spread, s.y);
                ctx.lineTo(s.x + spread, s.y);
                ctx.stroke();
                s.life -= 0.035;
                if (s.life <= 0) splashes.splice(i, 1);
            }
            // 永远循环（停雨后只画空背景，保证关灯时立刻恢复下雨）
            requestAnimationFrame(draw);
        }
        draw();
    })();

    // ═══ 灯：点击开关灯，zzz 循环浮动 ═══
    (function() {
        var lamp = document.querySelector('.lamp');
        if (!lamp) return;
        lamp.style.cursor = 'pointer';
        lamp.style.pointerEvents = 'auto';
        var sleeping = true;
        var spawnTimer = null;

        var insc = document.querySelector('.inscription');
        var rays = document.querySelector('.lamp-rays');
        var nonsense = document.getElementById('nonsense');

        // 胡诌词库
        var wordPool = [
            '夜坐', '听风', '昼眠', '听雨', '枕中', '梦', '不知', '春深',
            '闭门', '深山', '落叶', '空山', '松风', '竹影', '流水', '钟声',
            '白云', '孤舟', '渔火', '寒江', '独钓', '归鸟', '夕阳', '残月',
            '一盏', '半卷', '闲窗', '幽径', '青苔', '石阶', '柴扉', '野径',
            '星垂', '月涌', '风起', '云归', '雾散', '露凝', '霜降', '雪落',
            '晚钟', '晨鼓', '暮色', '晨光', '岁寒', '日暮', '灯火', '书卷',
            '一扇', '门', '书桌', '灯下', '纸上', '笔端', '墨痕', '茶烟',
            '夏夜', '蝉鸣', '蛙声', '稻香', '麦浪', '荷风', '竹林', '石桥',
            '小径', '篱笆', '庭院', '屋檐', '窗前', '枕边', '梦回', '醒来',
            // 烟雨江南
            '画船', '烟雨', '江南', '碧水', '如天', '柳岸', '桥头', '酒旗',
            '杏花', '春雨', '小楼', '深巷', '纸伞', '青石', '乌篷', '菱歌',
            '莲叶', '渔歌', '晚唱', '沙鸥', '白鹭', '青山', '绿水', '远帆',
            '流水', '人家', '古渡', '斜阳', '草色', '近却无', '波上',
            '寒烟', '翠微', '碧波', '春水', '映月', '画阁', '珠帘',
            '梅子', '黄时', '家家雨', '处处蛙', '闲梦', '远', '南国', '正采莲',
            // 古诗词拾遗
            '波渺渺', '柳依依', '芳草', '杏花飞', '蘋满', '汀洲',
            '月落', '乌啼', '霜天', '江枫', '渔火', '夜半', '钟声', '客船',
            '孤帆', '碧空', '烟花', '三月', '暮霭', '沉沉', '楚天',
            '杨柳岸', '晓风', '残月', '烟柳', '画桥', '帘卷', '西风',
            '梧桐', '细雨', '黄花', '寻觅', '疏影', '暗香', '月黄昏',
            '落花', '独立', '微雨', '燕双飞', '飞花', '轻似梦', '丝雨', '细如愁',
            '明月', '松间照', '清泉', '石上流', '竹喧', '浣女', '莲动', '渔舟',
            '人闲', '桂花落', '夜静', '春山空', '月出', '鸟鸣',
            '春江', '潮水', '明月', '潮生', '流霜', '白沙', '江月',
            '好雨', '随风', '润物', '花重', '锦官',
            '两个黄鹂', '翠柳', '一行白鹭', '青天', '千秋雪',
            '野渡', '舟自横', '春潮', '带雨',
            '早莺', '暖树', '新燕', '春泥', '乱花', '浅草',
            '山光', '悦鸟性', '潭影', '空人心',
            '江碧', '鸟逾白', '山青', '花欲燃',
            '采菊', '东篱下', '南山', '飞鸟',
            '行到水穷处', '坐看云起时',
            '空山新雨后', '天气晚来秋',
            '明月照', '松间', '清泉石上',
            '渔舟唱晚', '响穷', '彭蠡', '雁阵惊寒',
            '落霞', '孤鹜', '秋水', '长天'
        ];

        function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

        function generateNonsense() {
            var count = 2 + Math.floor(Math.random() * 2);
            var picked = [];
            var pool = wordPool.slice();
            for (var i = 0; i < count; i++) {
                var idx = Math.floor(Math.random() * pool.length);
                picked.push(pool[idx]);
                pool.splice(idx, 1);
            }
            return picked.join('，') + '。';
        }

        var nonsenseTimer = null;
        var activeSentences = [];

        function animateSentences() {
            var now = Date.now();
            for (var i = activeSentences.length - 1; i >= 0; i--) {
                var s = activeSentences[i];
                var progress = Math.min((now - s.start) / 8000, 1);
                var eased = 1 - Math.pow(1 - progress, 3);
                var tx = -38 * eased;
                var ty = -70 * eased;
                s.el.style.transform = 'translate(' + tx.toFixed(1) + 'px, ' + ty.toFixed(1) + 'px)';
                var fadeIn = Math.min(progress / 0.15, 1);
                var opacity = 0.9 * (1 - eased) * fadeIn;
                s.el.style.opacity = opacity.toFixed(3);
                if (progress >= 1) {
                    if (s.el.parentNode) s.el.parentNode.removeChild(s.el);
                    activeSentences.splice(i, 1);
                }
            }
            if (activeSentences.length > 0) {
                requestAnimationFrame(animateSentences);
            }
        }

        function spawnNonsense() {
            if (!nonsense) return;
            var el = document.createElement('div');
            el.textContent = generateNonsense();
            el.style.cssText = 'position:absolute;right:0;bottom:0;white-space:nowrap;font-family:ZCOOL XiaoWei,serif;font-size:0.85rem;color:var(--text-muted);text-align:right;line-height:2;opacity:0.9;';
            nonsense.appendChild(el);
            activeSentences.push({ el: el, start: Date.now() });
            if (activeSentences.length === 1) {
                requestAnimationFrame(animateSentences);
            }
        }

        function startNonsense() {
            if (nonsenseTimer) return;
            if (nonsense) {
                nonsense.innerHTML = '';
                nonsense.style.visibility = 'visible';
                nonsense.classList.remove('hidden');
            }
            activeSentences = [];
            spawnNonsense();
            nonsenseTimer = setInterval(spawnNonsense, 3000);
        }

        function stopNonsense() {
            if (nonsenseTimer) {
                clearInterval(nonsenseTimer);
                nonsenseTimer = null;
            }
            if (nonsense) {
                nonsense.classList.add('hidden');
                nonsense.innerHTML = '';
            }
            activeSentences = [];
        }

        // 初始关灯状态
        if (insc) insc.textContent = '昼眠听雨';
        if (rays) rays.classList.add('hidden');
        spawnZZZ();
        spawnTimer = setInterval(spawnZZZ, 3200);

        function spawnZZZ() {
            for (var zi = 0; zi < 3; zi++) {
                (function(idx) {
                    setTimeout(function() {
                        var z = document.createElement('div');
                        z.textContent = 'z';
                        var size = 0.85 + idx * 0.22;
                        var zBottom = 70 + idx * 18;
                        var zLeft = 120 + idx * 18;
                        var phase = Math.random() * 6.28;
                        z.style.cssText = 'position:fixed;bottom:' + zBottom + 'px;left:' + zLeft + 'px;font-size:' + size + 'rem;color:#ccc;font-weight:300;z-index:2;pointer-events:none;opacity:0;transition:opacity 0.5s ease;';
                        document.body.appendChild(z);
                        requestAnimationFrame(function() { z.style.opacity = '0.5'; });

                        var baseY = zBottom;
                        var t = 0;
                        var timer = setInterval(function() {
                            if (!sleeping) { clearInterval(timer); return; }
                            t += 0.05;
                            var floatY = Math.sin(t * 1.5 + phase) * 3;
                            z.style.bottom = (baseY + floatY) + 'px';
                        }, 30);

                        setTimeout(function() {
                            z.style.opacity = '0';
                            setTimeout(function() {
                                clearInterval(timer);
                                if (z.parentNode) z.parentNode.removeChild(z);
                            }, 500);
                        }, 2500);
                    }, idx * 380);
                })(zi);
            }
        }

        lamp.addEventListener('click', function() {
            sleeping = !sleeping;
            raining = sleeping;
            if (sleeping && window.resetDrops) window.resetDrops();
            if (sleeping) {
                if (insc) insc.textContent = '昼眠听雨';
                if (rays) rays.classList.add('hidden');
                spawnZZZ();
                spawnTimer = setInterval(spawnZZZ, 3200);
            } else {
                if (insc) insc.textContent = '夜坐听风';
                if (rays) rays.classList.remove('hidden');
                if (!window._nonsenseStarted) {
                    window._nonsenseStarted = true;
                    startNonsense();
                }
                if (spawnTimer) { clearInterval(spawnTimer); spawnTimer = null; }
            }
        });
    })();
</script>
<script src="../../wander-mode.js"></script>
</body>
</html>
