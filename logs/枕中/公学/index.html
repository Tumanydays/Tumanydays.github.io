<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>公学 — Tumanydays</title>
            <link rel="icon" type="image/png" href="../../../images/icon.png">
    <link rel="stylesheet" href="../../../style.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Noto Serif SC", -apple-system, BlinkMacSystemFont, "Segoe UI", serif; background: #f5f0e8; color: var(--text); line-height: 1.9; }
        .container { max-width: 680px; margin: 0 auto; padding: 64px 24px 80px; }
        .back { font-size: 0.85rem; color: var(--text-dim); text-decoration: none; margin-bottom: 16px; display: inline-block; }
        .back:hover { color: var(--hover); }
        h1 { font-size: 1.6rem; font-weight: 400; letter-spacing: 2px; margin-bottom: 4px; color: var(--text-title); }
        .subtitle { font-size: 0.85rem; color: var(--text-dim); margin-bottom: 48px; }
        .series-list { list-style: none; }
        .series-list li { border-bottom: 1px solid #eee; padding: 18px 0; }
        .series-list a { text-decoration: none; display: block; }
        .series-list a:hover .entry-title { color: var(--hover); }
        .entry-title { font-size: 0.95rem; color: var(--text); margin-bottom: 2px; }
        .entry-desc { font-size: 0.8rem; color: var(--text-dim); line-height: 1.5; }
        footer { margin-top: 64px; padding-top: 24px; border-top: 1px solid var(--border); text-align: center; font-size: 0.8rem; color: var(--text-dim); }
        footer a { color: var(--text-dim); text-decoration: none; }
        footer a:hover { color: var(--hover); }
        @media (max-width: 500px) { .container { padding: 32px 16px 64px; } }
    </style>
</head>
<body>
    <div class="container">
        <a class="back" href="../index.html">← 枕中</a>
        <h1>公学</h1>
        <p class="subtitle">关于实践的所有奋斗</p>
        <ul class="series-list">
            <li>
                <a href="综合知识/">
                    <div class="entry-title">综合知识</div>
                    <div class="entry-desc">夏天的那场考试</div>
                </a>
            </li>
        </ul>
        <footer>
            <a href="../index.html">← 返回枕中</a>
        </footer>
    </div>
<script src="../../../wander-mode.js"></script>
</body>
</html>
