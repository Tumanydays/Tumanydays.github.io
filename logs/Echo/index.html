<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Echo — Tumanydays</title>
    <link rel="icon" type="image/png" href="../../images/icon.png">
    <link rel="stylesheet" href="../../style.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Serif SC", serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.9;
        }
        .container {
            max-width: 640px;
            margin: 0 auto;
            padding: 64px 24px 80px;
        }
        .back {
            font-size: 0.85rem;
            color: var(--text-dim);
            text-decoration: none;
            margin-bottom: 16px;
            display: inline-block;
        }
        .back:hover { color: var(--hover); }
        h1 {
            font-size: 1.6rem;
            font-weight: 400;
            letter-spacing: 2px;
            margin-bottom: 4px;
            color: var(--text-title);
        }
        .subtitle {
            font-size: 0.85rem;
            color: var(--text-dim);
            margin-bottom: 56px;
        }

        /* ---------- 渐入效果 ---------- */
        .fragment {
            opacity: 0;
            transform: translateY(8px);
            transition: opacity 1s ease, transform 1s ease;
            margin-bottom: 48px;
        }
        .fragment.revealed {
            opacity: 1;
            transform: translateY(0);
        }

        /* ---------- 碎片墙 ---------- */
        .fragment-text {
            font-size: 0.95rem;
            color: var(--text-soft);
            line-height: 2.2;
            font-style: italic;
            letter-spacing: 0.5px;
        }
        .fragment-source {
            font-size: 0.8rem;
            color: var(--text-faint);
            text-align: right;
            margin-top: 8px;
            font-style: normal;
        }
        .fragment::after {
            content: "";
            display: block;
            width: 24px;
            height: 1px;
            background: #ddd;
            margin: 48px auto 0;
        }
        .fragment:last-child::after { display: none; }

        .tagline {
            text-align: center;
            color: var(--text-faint);
            font-size: 0.85rem;
            font-style: italic;
            margin: 60px auto 0;
        }

        footer {
            margin-top: 64px;
            padding-top: 24px;
            border-top: 1px solid var(--border);
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-dim);
        }
        footer a { color: var(--text-dim); text-decoration: none; }
        footer a:hover { color: var(--hover); }

        @media (max-width: 500px) {
            .container { padding: 32px 16px 64px; }
        }
    </style>
</head>
<body>
    <div class="container">

        <a class="back" href="../index.html">← 日志大厅</a>

        <h1>Echo</h1>
        <p class="subtitle">浮尘在光里</p>

        <!-- 碎片墙：由 JS 从 fragments.js 自动渲染 -->
        <div id="fragment-wall"></div>

        <!-- 隐藏列表，供日志大厅自动计数 -->
        <ul class="article-list" style="display:none;"></ul>

        <p class="tagline">— 思想的讨论不会停止 —</p>

        <footer>
        <footer>
            <a href="../index.html">← 返回日志大厅</a>
            &nbsp;·&nbsp;
            <a href="../../index.html">← 返回首页</a>
        </footer>

    </div>

    <script src="fragments.js"></script>
    <script>
        // 渲染碎片墙（打乱顺序，每次刷新看到的排列不一样）
        var wall = document.getElementById("fragment-wall");

        // Fisher-Yates 洗牌
        var shuffled = fragments.slice();
        for (var i = shuffled.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = shuffled[i];
            shuffled[i] = shuffled[j];
            shuffled[j] = tmp;
        }

        shuffled.forEach(function(f, idx) {
            var div = document.createElement("div");
            div.className = "fragment";
            div.id = f.id;
            div.style.transitionDelay = (idx * 0.08) + "s";

            var textDiv = document.createElement("div");
            textDiv.className = "fragment-text";
            f.text.forEach(function(line, i) {
                if (i > 0) textDiv.appendChild(document.createElement("br"));
                textDiv.appendChild(document.createTextNode(line));
            });
            div.appendChild(textDiv);

            if (f.source) {
                var sourceDiv = document.createElement("div");
                sourceDiv.className = "fragment-source";
                sourceDiv.textContent = "—— " + f.source;
                div.appendChild(sourceDiv);
            }

            wall.appendChild(div);
        });

        // 填充隐藏列表，供日志大厅自动计数
        var hiddenList = document.querySelector(".article-list");
        fragments.forEach(function() {
            var li = document.createElement("li");
            hiddenList.appendChild(li);
        });

        // 渐入观察器：碎片进入视口时浮现
        var observer = new IntersectionObserver(function(entries) {
            entries.forEach(function(entry) {
                if (entry.isIntersecting) {
                    entry.target.classList.add('revealed');
                    observer.unobserve(entry.target);
                }
            });
        }, { threshold: 0.15 });
        document.querySelectorAll('.fragment').forEach(function(f) { observer.observe(f); });
    </script>

</body>
</html>
