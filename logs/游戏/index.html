<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>游戏目录 — Tumanydays</title>
    <link rel="icon" type="image/png" href="../../images/icon.png">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;600&amp;family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&amp;family=ZCOOL+XiaoWei&amp;display=swap" rel="stylesheet" media="print" onload="this.media='all'">
    <noscript><link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;600&amp;family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&amp;family=ZCOOL+XiaoWei&amp;display=swap" rel="stylesheet"></noscript>
    <link rel="stylesheet" href="../../style.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Noto Serif SC", "Songti SC", serif;
            background: #ece6dc;
            color: #4a4440;
            min-height: 100vh;
            line-height: 1.9;
        }
        .container {
            max-width: 520px;
            margin: 0 auto;
            padding: 80px 24px;
            text-align: center;
        }
        .back {
            font-size: 0.8rem;
            color: #c0b8a8;
            text-decoration: none;
            display: inline-block;
            margin-bottom: 64px;
            letter-spacing: 1px;
        }
        .back:hover { color: #8a7e72; }

        h1 {
            font-family: "ZCOOL XiaoWei", "Noto Serif SC", serif;
            font-size: 1.2rem;
            font-weight: 300;
            letter-spacing: 6px;
            color: #b0a898;
            margin-bottom: 56px;
        }

        .game-entry {
            margin-bottom: 48px;
        }
        .game-entry:last-child {
            margin-bottom: 0;
        }
        .game-title {
            font-size: 1.05rem;
            color: #6a6058;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }
        .game-desc {
            font-size: 0.82rem;
            color: #b0a898;
            line-height: 1.8;
            margin-bottom: 16px;
        }
        .game-link {
            display: inline-block;
            font-size: 0.78rem;
            color: #a09888;
            text-decoration: none;
            border: 1px solid #d5cdc0;
            padding: 6px 20px;
            letter-spacing: 1px;
            transition: border-color 0.2s, color 0.2s;
        }
        .game-link:hover {
            border-color: #8a7e72;
            color: #8a7e72;
        }

        hr {
            border: none;
            border-top: 1px solid #e0d8cc;
            width: 40px;
            margin: 48px auto;
        }

        .status {
            margin-top: 64px;
            font-size: 0.7rem;
            color: #c0b8a8;
            letter-spacing: 1px;
        }

        @media (max-width: 500px) {
            .container { padding: 60px 20px; }
        }
    </style>
</head>
<body>
<div class="container">
    <a class="back" href="../../index.html">← Tumanydays</a>
    <h1>┃ 游 戏 目 录</h1>

    <div class="game-entry">
        <div class="game-title">七夜敞廊</div>
        <div class="game-desc">
            帕拉蒂尼山上的一栋房子，一个老人。<br>
            七次日落。七个关于诗、命运、时间与记忆的夜晚。
        </div>
        <a class="game-link" href="七夜敞廊/">进入游戏</a>
    </div>

    <hr>

    <div class="game-entry">
        <div class="game-title">风景如旧</div>
        <div class="game-desc">
            西塞罗在凯撒渡河后的一天。<br>
            七个地点，七封信。在他离开罗马之前，风景从未改变。
        </div>
        <a class="game-link" href="风景如旧/">进入游戏</a>
    </div>

    <div class="status">
        · 迷失域 ·
    </div>
</div>
<script src="../../wander-mode.js"></script>
</body>
</html>
