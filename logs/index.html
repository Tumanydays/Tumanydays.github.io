<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日志 — Tumanydays</title>
    <link rel="icon" type="image/png" href="../images/icon.png">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/0.7.2/p5.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Serif SC", serif;
            background: #fafafa;
            color: #333;
            line-height: 1.9;
            animation: fadeIn 0.8s cubic-bezier(0.0, 0.0, 0.3, 1);
        }

        /* 背景几何动画 */
        #p5-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }
        .container {
            position: relative;
            z-index: 1;
            max-width: 680px;
            margin: 0 auto;
            padding: 64px 24px 80px;
        }

        .back {
            font-size: 0.85rem;
            color: #999;
            text-decoration: none;
            margin-bottom: 48px;
            display: inline-block;
        }
        .back:hover { color: #8a939e; }

        h1 {
            font-size: 1.6rem;
            font-weight: 400;
            letter-spacing: 2px;
            margin-bottom: 8px;
            color: #1a1a1a;
        }
        .subtitle {
            font-size: 0.85rem;
            color: #aaa;
            margin-bottom: 48px;
        }

        /* ---------- 八个分类卡片 ---------- */
        .categories {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        .cat-card {
            display: block;
            text-decoration: none;
            border: 1px solid #e8e8e8;
            border-radius: 8px;
            padding: 20px;
            background: rgba(255,255,255,0.65);
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .cat-card:hover {
            border-color: #ccc;
            box-shadow: 0 2px 12px rgba(0,0,0,0.04);
        }
        .cat-name {
            font-size: 1.05rem;
            color: #1a1a1a;
            font-weight: 500;
            margin-bottom: 4px;
        }
        .cat-desc {
            font-size: 0.78rem;
            color: #999;
            line-height: 1.6;
        }
        .cat-count {
            font-size: 0.7rem;
            color: #bbb;
            margin-top: 6px;
        }

        /* 响应式：小屏变单列 */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        @media (max-width: 500px) {
            .categories { grid-template-columns: 1fr; }
            .container { padding: 32px 16px 64px; }
        }

        footer {
            margin-top: 64px;
            padding-top: 24px;
            border-top: 1px solid #e8e8e8;
            text-align: center;
            font-size: 0.8rem;
            color: #aaa;
        }
        footer a {
            color: #999;
            text-decoration: none;
        }
        footer a:hover { color: #333; }
    </style>
</head>
<body>
    <div id="p5-bg"></div>
    <div class="container">

        <!-- 顶部返回 -->
        <a class="back" href="../index.html">← Tumanydays</a>

        <h1>日志</h1>
        <p class="subtitle">八个房间，八种凝视世界的方式</p>

        <!-- 八个分类 -->
        <div class="categories">

            <a class="cat-card" href="字渡/">
                <div class="cat-name">字渡</div>
                <div class="cat-desc">文学、翻译与语言之美</div>
                <div class="cat-count">1 篇</div>
            </a>

            <a class="cat-card" href="浮光/">
                <div class="cat-name">浮光</div>
                <div class="cat-desc">日常碎片，掠过的远方</div>
                <div class="cat-count">1 篇</div>
            </a>

            <a class="cat-card" href="观澜/">
                <div class="cat-name">观澜</div>
                <div class="cat-desc">一些严肃的讨论</div>
                <div class="cat-count">1 篇</div>
            </a>

            <a class="cat-card" href="Salvatore/">
                <div class="cat-name">Salvatore</div>
                <div class="cat-desc">可乐、樱桃，与盛夏的挽歌</div>
                <div class="cat-count">0 篇</div>
            </a>

            <a class="cat-card" href="光与影/">
                <div class="cat-name">光与影</div>
                <div class="cat-desc">时间之外的兔子洞</div>
                <div class="cat-count">0 篇</div>
            </a>

            <a class="cat-card" href="月光/">
                <div class="cat-name">月光</div>
                <div class="cat-desc">音乐与深夜里的对话</div>
                <div class="cat-count">0 篇</div>
            </a>

            <a class="cat-card" href="棱镜/">
                <div class="cat-name">棱镜</div>
                <div class="cat-desc">技术、AI 与思维工具</div>
                <div class="cat-count">2 篇</div>
            </a>

            <a class="cat-card" href="Echo/">
                <div class="cat-name">Echo</div>
                <div class="cat-desc">浮尘在光里</div>
            </a>

        </div>

        <footer>
            <a href="../index.html">← 返回首页</a>
        </footer>

    </div>

    <script>
    // 自动统计各分类文章数量（从各分类目录页抓取 .article-list li）
    document.addEventListener('DOMContentLoaded', function() {
        var cards = document.querySelectorAll('.cat-card');
        cards.forEach(function(card) {
            var href = card.getAttribute('href');
            fetch(href + 'index.html')
                .then(function(r) { return r.text(); })
                .then(function(html) {
                    var parser = new DOMParser();
                    var doc = parser.parseFromString(html, 'text/html');
                    var count = doc.querySelectorAll('.article-list li').length;
                    var countEl = card.querySelector('.cat-count');
                    if (countEl) countEl.textContent = count + ' 篇';
                })
                .catch(function() {
                    // 请求失败则保留硬编码数字作为 fallback
                });
        });
    });
    </script>

    <script>
    var sketch = function(p) {
        var t, speed = 2e-5;
        var l = 80;
        var rads = [];
        p.setup = function() {
            var canvas = p.createCanvas(p.windowWidth, p.windowHeight);
            canvas.parent('p5-bg');
            p.colorMode(p.HSB, 1);
            p.strokeWeight(0.4);
            for (var i = 3; i < 11; i++) {
                rads[i] = l / (2 * p.tan(p.PI / i));
            }
        };
        p.draw = function() {
            t = speed * p.millis();
            p.background(250 / 255);
            p.push();
            p.translate(p.width / 2, p.height / 2);
            var s = p.min(p.width, p.height) / 500;
            p.scale(s);
            for (var i = 10; i > 2; i--) {
                var b = p.map(i, 3, 11, 0.72, 0.92);
                p.stroke(0, 0, b);
                poly(i);
            }
            for (var i = 3; i < 11; i++) {
                p.fill(0, 0, 0.35);
                dott(i, (11 - i) * t);
            }
            p.pop();
        };
        p.windowResized = function() {
            p.resizeCanvas(p.windowWidth, p.windowHeight);
        };
        function poly(N) {
            for (var i = 0; i < N; i++) {
                p.push();
                p.rotate(p.TWO_PI * i / N);
                p.line(-l / 2, rads[N], l / 2, rads[N]);
                p.pop();
            }
        }
        function dott(N, q) {
            q = (q + 0.5 / N) % 1;
            var qq = (q * N) % 1;
            var rot = Math.floor(q * N);
            p.push();
            p.rotate(p.TWO_PI * rot / N);
            p.noStroke();
            p.ellipse(p.lerp(l / 2, -l / 2, qq), rads[N], l * 0.1, l * 0.1);
            p.pop();
        }
    };
    new p5(sketch);
    </script>

</body>
</html>
