<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>摘花 — Tumanydays</title>
    <link rel="icon" type="image/png" href="../../images/icon.png">
    <link rel="stylesheet" href="../../style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;600&amp;display=swap" rel="stylesheet">
    <style>
        body { line-height: 1.9; }
        .container { max-width: 680px; margin: 0 auto; padding: 64px 24px 80px; }
        .back {
            font-size: 0.85rem;
            color: var(--text-dim);
            text-decoration: none;
            margin-bottom: 48px;
            display: inline-block;
        }
        .back:hover { color: var(--hover); }
        h1 {
            font-size: 1.8rem;
            font-weight: 400;
            letter-spacing: 2px;
            line-height: 1.5;
            margin-bottom: 16px;
            color: var(--text-title);
        }
        .meta {
            font-size: 0.85rem;
            color: var(--text-dim);
            margin-bottom: 48px;
        }
        .meta span { margin-right: 16px; }
        .meta a { color: var(--text-faint); text-decoration: none; }
        .meta a:hover { color: var(--hover); }

        .poem-line {
            font-size: 1rem;
            color: var(--text-soft);
            line-height: 2.2;
            margin-bottom: 32px;
        }
        .stanza-gap {
            height: 24px;
        }

        footer {
            margin-top: 64px;
            padding-top: 24px;
            border-top: 1px solid var(--border);
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-dim);
        }
        footer a { color: var(--text-dim); text-decoration: none; }
        footer a:hover { color: var(--hover); }

        @media (max-width: 500px) {
            .container { padding: 32px 16px 64px; }
            h1 { font-size: 1.4rem; }
            .poem-line { font-size: 0.9rem; }
        }
    </style>
</head>
<body>
    <div class="container">

        <a class="back" href="../index.html">← 字渡</a>

        <h1>摘花</h1>
        <div class="meta">
            <span>字渡</span><span>罗伯特·弗罗斯特 &nbsp;·&nbsp; <a href="../index.html">日志</a></span>
        </div>

        <p class="poem-line">清晨，我离开你，</p>
        <p class="poem-line">沐浴着清晨的明辉，</p>
        <p class="poem-line">你，在另一条道上，</p>
        <p class="poem-line">使我走得伤悲。</p>

        <div class="stanza-gap"></div>

        <p class="poem-line">你是否知道，黄昏，</p>
        <p class="poem-line">我已形容憔悴一身灰尘？</p>
        <p class="poem-line">你默不作声是因为不了解，</p>
        <p class="poem-line">还是因为了解默不作声？</p>

        <div class="stanza-gap"></div>

        <p class="poem-line">全都由我？就不问我</p>
        <p class="poem-line">那已凋谢的美艳花朵，</p>
        <p class="poem-line">那些花曾使我离开你身边，</p>
        <p class="poem-line">度过几个世纪般的一天？</p>

        <div class="stanza-gap"></div>

        <p class="poem-line">花已是你的，请以花为尺，</p>
        <p class="poem-line">度量你珍视他们的价值，</p>
        <p class="poem-line">度量我远离开你的</p>
        <p class="poem-line">那一小会。</p>

        <footer>
            <a href="../index.html">← 返回字渡</a>
            &nbsp;·&nbsp;
            <a href="../../index.html">← 返回首页</a>
        </footer>

    </div>
<script src="../../wander-mode.js"></script>
</body>
</html>
