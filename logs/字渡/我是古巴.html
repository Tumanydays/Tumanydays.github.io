        <h1>我是古巴</h1>
        <div class="meta">
            <span>字渡</span><span>&nbsp;·&nbsp; <a href="../index.html">日志</a></span>
        </div>

        <p class="poem-line">我是古巴，我是哈瓦那，我是退潮后礁石上千万千涸的泡沫。</p>
        <p class="poem-line">我是古巴，我是甘蔗，我是那连同家园一起燃烧的大片甘蔗。</p>
        <p class="poem-line">我是古巴，我是姑娘，我爱上了卖水果的小伙子，他开朗又善良，他每天欢快的歌唱，可我是妓女。</p>
        <p class="poem-line">我是古巴，我是雪茄，我热爱生活，热爱每天亲吻我的人，我不停地燃烧。</p>
        <p class="poem-line">我是古巴，我是音乐，一点点丰收的喜悅就值得我纵情歌唱，可谁又能听见我的悲伤？</p>
        <p class="poem-line">我是古巴，我们的身边不是海洋…是抑制不住的泪，它流了下来，变成了鲜血。</p>
        <p class="poem-line">我是古巴，我是革命！我是掠夺者打不死的墙！</p>
        <p class="poem-line">我是古巴，我是解放……</p>
